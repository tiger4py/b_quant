<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>因子详情 — Alpha因子实验室</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; }
  .nav { background: #161822; border-bottom: 1px solid #2a2d3e; padding: 0 28px; display: flex; align-items: center; height: 48px; }
  .nav a { color: #8b92a0; text-decoration: none; font-size: 13px; padding: 0 16px; height: 100%; display: flex; align-items: center; border-bottom: 2px solid transparent; }
  .nav a:hover, .nav a.on { color: #e1e4e8; border-bottom-color: #3b82f6; }
  .nav .brand { font-weight: 600; color: #e1e4e8; margin-right: 24px; font-size: 14px; }
  .page { max-width: 1320px; margin: 0 auto; padding: 24px; }
  .topline { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
  h2 { font-size: 20px; }
  .sub { color: #8b92a0; font-size: 13px; margin-top: 4px; }
  .btn { background: #1e2030; border: 1px solid #2a2d3e; color: #c4c8d0; border-radius: 8px; padding: 8px 14px; cursor: pointer; text-decoration: none; font-size: 13px; }
  .btn:hover { border-color: #3b82f6; color: #e1e4e8; }
  .panel { background: #161822; border: 1px solid #2a2d3e; border-radius: 14px; padding: 20px; margin-bottom: 18px; }
  .panel h3 { font-size: 14px; margin-bottom: 14px; color: #a5b4fc; }
  select { background:#0f1117; border:1px solid #2a2d3e; border-radius:8px; color:#e1e4e8; padding:8px 10px; font-size:13px; min-width: 260px; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 10px; }
  .stat-box { background: #0f1117; border: 1px solid #1e2030; border-radius: 8px; padding: 12px 14px; text-align: center; }
  .stat-box .v { font-size: 22px; font-weight: 700; }
  .stat-box .l { font-size: 11px; color: #6b7280; margin-top: 4px; }
  .green { color: #22c55e; } .red { color: #ef4444; }
  .analysis { color:#aeb6c5; font-size:13px; line-height:1.8; }
  .trade-table-wrap { overflow-x: auto; }
  table { width: 100%; min-width: 760px; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 9px 10px; border-bottom: 1px solid #2a2d3e; color: #6b7280; font-weight: 500; white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid #1e2030; white-space: nowrap; }
  tr:hover td { background: #1a1d2e; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .pager { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; color: #8b92a0; font-size: 12px; }
  .pager-controls { display: flex; align-items: center; gap: 8px; }
  .pager button {
    background: #1e2030; border: 1px solid #2a2d3e; border-radius: 6px; color: #c4c8d0;
    padding: 5px 10px; font-size: 12px; cursor: pointer;
  }
  .pager button:hover:not(:disabled) { border-color: #3b82f6; color: #e1e4e8; }
  .pager button:disabled { opacity: .45; cursor: not-allowed; }
  .empty { color: #6b7280; text-align: center; padding: 60px 20px; }
  @media (max-width: 760px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .topline { align-items: flex-start; flex-direction: column; }
  }
</style>
</head>
<body>
<nav class="nav">
  <span class="brand">A股数据面板</span>
  <a href="/">首页</a>
  <a href="/stocks">个股</a>
  <a href="/concepts">概念</a>
  <a href="/strategy-backtest">策略回测</a>
  <a href="/strategy-lab" class="on">策略试验</a>
  <a href="/trading">实盘记录</a>
</nav>

<div class="page">
  <div class="topline">
    <div>
      <h2 id="title">因子详情</h2>
      <div class="sub" id="subtitle">加载中...</div>
    </div>
    <a class="btn" href="/strategy-lab">返回实验室</a>
  </div>

  <div class="panel">
    <select id="factor-select" onchange="changeFactor(this.value)"></select>
  </div>

  <div id="body" class="empty">加载中...</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const cacheKey = params.get('cache') || '';
let factor = params.get('factor') || '';
let detailData = null;
let tradePage = 1;
const TRADE_PAGE_SIZE = 50;

function fmtSigned(v) {
  return `${v >= 0 ? '+' : ''}${v}%`;
}

async function loadDetail() {
  const res = await fetch(`/api/lab/detail?cache=${encodeURIComponent(cacheKey)}&factor=${encodeURIComponent(factor)}`).then(r => r.json());
  if (res.error) {
    document.getElementById('body').innerHTML = `<div class="empty">${res.error}</div>`;
    return;
  }
  detailData = res;
  renderDetail(res);
}

function renderDetail(data) {
  const fn = data.factor;
  const fdata = data.factor_data;
  const s = fdata.stats;
  const meta = data.factor_meta[fn] || {};
  const names = data.item_names || {};
  const factorNames = data.factor_names || {};

  document.getElementById('title').textContent = `${factorNames[fn] || fn} 详情`;
  document.getElementById('subtitle').textContent = `${data.window || ''} · Top${data.top_k || '-'} · ${data.item_count || '-'}标的 · 缓存 ${data.cache?.created_at || '-'}`;
  document.getElementById('factor-select').innerHTML = (data.available_factors || [])
    .map(k => `<option value="${k}" ${k === fn ? 'selected' : ''}>${factorNames[k] || k}</option>`)
    .join('');

  const retColor = s.total_return >= 0 ? 'green' : 'red';
  document.getElementById('body').innerHTML = `
    <div class="panel">
      <div class="stat-grid">
        <div class="stat-box"><div class="v ${retColor}">${fmtSigned(s.total_return)}</div><div class="l">总收益</div></div>
        <div class="stat-box"><div class="v">${s.sharpe}</div><div class="l">夏普比率</div></div>
        <div class="stat-box"><div class="v red">${s.max_dd}%</div><div class="l">最大回撤</div></div>
        <div class="stat-box"><div class="v">${s.win_rate}%</div><div class="l">胜率</div></div>
        <div class="stat-box"><div class="v">${s.trade_count}</div><div class="l">交易笔数</div></div>
        <div class="stat-box"><div class="v green">+${s.avg_win}%</div><div class="l">均盈</div></div>
        <div class="stat-box"><div class="v red">${s.avg_loss}%</div><div class="l">均亏</div></div>
        <div class="stat-box"><div class="v" style="font-size:14px;">${meta.higher_better ? '越高越好' : '越低越好'}</div><div class="l">因子方向</div></div>
      </div>
    </div>

    <div class="panel">
      <h3>因子分析</h3>
      <p class="analysis">
        策略：每日收盘后按 <b>${factorNames[fn] || fn}</b> 排名，
        ${meta.higher_better ? '选最高的' : '选最低的'} ${data.top_k} 个标的等权持有，下一交易日生效。<br>
        ${s.total_return > 0
          ? `该因子在回测区间内表现<span class="green">正向有效</span>，夏普 ${s.sharpe}，胜率 ${s.win_rate}%。`
          : `该因子在回测区间内表现<span class="red">不佳</span>，累计收益 ${s.total_return}%。`}
        ${s.max_dd < -15 ? ` 最大回撤 ${s.max_dd}% 较大，注意风控。` : ''}
      </p>
    </div>

    <div class="panel">
      <h3>交易流水</h3>
      <div class="pager">
        <span id="trade-page-info">--</span>
        <div class="pager-controls">
          <button id="trade-prev" onclick="changeTradePage(-1)">上一页</button>
          <button id="trade-next" onclick="changeTradePage(1)">下一页</button>
        </div>
      </div>
      <div class="trade-table-wrap">
        <table>
          <thead><tr><th>标的</th><th>买入</th><th>卖出</th><th>买价</th><th>卖价</th><th>收益</th><th>持时</th></tr></thead>
          <tbody id="trade-body"></tbody>
        </table>
      </div>
    </div>
  `;
  renderTradePage();
}

function changeFactor(nextFactor) {
  factor = nextFactor;
  tradePage = 1;
  history.replaceState(null, '', `/strategy-lab/detail?cache=${encodeURIComponent(cacheKey)}&factor=${encodeURIComponent(factor)}`);
  loadDetail();
}

function renderTradePage() {
  if (!detailData) return;
  const fdata = detailData.factor_data || {};
  const names = detailData.item_names || {};
  const trades = [...(fdata.trades || [])].reverse();
  const total = trades.length;
  const totalPages = Math.max(1, Math.ceil(total / TRADE_PAGE_SIZE));
  tradePage = Math.max(1, Math.min(tradePage, totalPages));
  const start = (tradePage - 1) * TRADE_PAGE_SIZE;
  const pageTrades = trades.slice(start, start + TRADE_PAGE_SIZE);
  document.getElementById('trade-page-info').textContent = total
    ? `第 ${tradePage}/${totalPages} 页 · ${start + 1}-${Math.min(start + TRADE_PAGE_SIZE, total)} / ${total} 条 · 每页 ${TRADE_PAGE_SIZE} 条`
    : '暂无交易';
  document.getElementById('trade-prev').disabled = tradePage <= 1;
  document.getElementById('trade-next').disabled = tradePage >= totalPages;
  document.getElementById('trade-body').innerHTML = pageTrades.map(t => {
    const pc = t.profit_pct >= 0 ? 'green' : 'red';
    const name = names[t.code] || t.code;
    return `<tr>
      <td title="${name}">${name}</td>
      <td>${t.buy_date}</td>
      <td>${t.sell_date}</td>
      <td class="num">${t.buy_price}</td>
      <td class="num">${t.sell_price}</td>
      <td class="num ${pc}">${fmtSigned(t.profit_pct)}</td>
      <td class="num">${t.hold_days}天</td>
    </tr>`;
  }).join('') || '<tr><td colspan="7" class="empty">暂无交易</td></tr>';
}

function changeTradePage(delta) {
  tradePage += delta;
  renderTradePage();
}

loadDetail();
</script>
</body>
</html>
