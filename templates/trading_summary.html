<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易总结 — A股数据面板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  .nav { background: #161822; border-bottom: 1px solid #2a2d3e; padding: 0 28px; display: flex; align-items: center; height: 48px; }
  .nav a { color: #8b92a0; text-decoration: none; font-size: 13px; padding: 0 16px; height: 100%; display: flex; align-items: center; border-bottom: 2px solid transparent; }
  .nav a:hover, .nav a.on { color: #e1e4e8; border-bottom-color: #3b82f6; }
  .nav .brand { font-weight: 600; color: #e1e4e8; margin-right: 24px; font-size: 14px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 28px; }

  h1 { font-size: 20px; margin-bottom: 8px; }
  .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 24px; }

  .kpi-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .kpi { flex: 1; min-width: 140px; background: #161822; border: 1px solid #2a2d3e; border-radius: 8px; padding: 16px 20px; }
  .kpi .label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
  .kpi .value { font-size: 24px; font-weight: 700; }
  .kpi .sub { font-size: 11px; color: #6b7280; margin-top: 2px; }

  .green { color: #22c55e; } .red { color: #ef4444; } .yellow { color: #f59e0b; }

  .section { background: #161822; border: 1px solid #2a2d3e; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .section h2 { font-size: 16px; margin-bottom: 16px; border-bottom: 1px solid #2a2d3e; padding-bottom: 10px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; color: #6b7280; font-weight: 500; border-bottom: 1px solid #2a2d3e; }
  td { padding: 8px 12px; border-bottom: 1px solid #161c26; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .tag-up { background: #22c55e22; color: #22c55e; }
  .tag-down { background: #ef444422; color: #ef4444; }

  .bar { height: 6px; border-radius: 3px; background: #2a2d3e; margin-top: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }

  .flex2 { display: flex; gap: 20px; flex-wrap: wrap; }
  .flex2 > * { flex: 1; min-width: 320px; }

  .empty { padding: 40px; text-align: center; color: #6b7280; }
</style>
</head>
<body>
<nav class="nav">
  <span class="brand">A股数据面板</span>
  <a href="/">首页</a>
  <a href="/stocks">个股</a>
  <a href="/concepts">概念</a>
  <a href="/strategy-backtest">策略回测</a>
  <a href="/strategy-lab">策略试验</a>
  <a href="/trading">交易复盘</a>
  <a href="/trading-summary" class="on">交易总结</a>
</nav>

<div class="container">
  <h1>📊 交易总结</h1>
  <p class="subtitle" id="summaryDate">加载中...</p>

  <!-- 交易铁律 -->
  <div class="section" style="border-color: #f59e0b44; background: linear-gradient(135deg, #1a1800 0%, #161822 100%);">
    <h2 style="color:#f59e0b; border-color:#f59e0b44;">⚡ 交易铁律 <span style="font-weight:400;font-size:12px;color:#6b7280;">— 从你的复盘中总结</span></h2>
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:10px; font-size:13px;" id="rulesGrid"></div>
    <div style="margin-top:10px; font-size:12px; color:#6b7280; display:flex; gap:16px; flex-wrap:wrap;">
      <span id="mistakeStats">—</span>
      <span>📝 复盘 <span id="journalCount">—</span> 天 | 按计划率 <span id="planRate">—</span></span>
    </div>
  </div>

  <div class="kpi-row" id="kpiRow"></div>

  <div class="flex2">
    <div class="section">
      <h2>📈 月度表现</h2>
      <div id="monthlyChart"></div>
    </div>
    <div class="section">
      <h2>🎯 按策略来源</h2>
      <div id="strategyBreakdown"></div>
    </div>
  </div>

  <div class="flex2">
    <div class="section">
      <h2>🏆 最佳 / 👎 最差交易</h2>
      <div id="bestWorst"></div>
    </div>
    <div class="section">
      <h2>💼 当前持仓</h2>
      <div id="holdingsTable"></div>
    </div>
  </div>
</div>

<script>
async function load() {
  const [r, rr] = await Promise.all([
    fetch("/api/trading/summary"),
    fetch("/api/trading/rules"),
  ]);
  const d = await r.json();
  const rules = await rr.json();

  // 铁律
  document.getElementById("rulesGrid").innerHTML = rules.map(r =>
    `<div style="display:flex; gap:8px; align-items:flex-start; padding:8px; background:#11151c; border-radius:6px;">
      <span style="font-size:18px;">${r.level}</span>
      <div><b>${r.title}</b><br><span style="color:#6b7280;">${r.detail}</span></div>
    </div>`).join("");

  document.getElementById("summaryDate").textContent =
    `最近交易: ${d.latest_date || "-"} | 复盘: ${d.reviewed_days}/${d.total_journal_days} 天`;
  document.getElementById("planRate").textContent = (d.plan_rate || 0).toFixed(0) + "%";
  document.getElementById("journalCount").textContent = d.total_journal_days;
  document.getElementById("mistakeStats").textContent =
    "📊 错误: " + (d.top_mistakes || []).map(m => `${m.name} ${m.count}次`).join(" | ") || "—";

  // KPI
  const pnlColor = d.total_pnl >= 0 ? "green" : "red";
  document.getElementById("kpiRow").innerHTML = `
    <div class="kpi"><div class="label">已完成交易</div><div class="value">${d.total_trades}</div><div class="sub">笔</div></div>
    <div class="kpi"><div class="label">累计盈亏</div><div class="value ${pnlColor}">${d.total_pnl >= 0 ? '+' : ''}${d.total_pnl.toFixed(1)}%</div></div>
    <div class="kpi"><div class="label">胜率</div><div class="value ${d.win_rate >= 50 ? 'green' : 'yellow'}">${d.win_rate.toFixed(0)}%</div><div class="sub">${d.avg_win >= 0 ? '+' : ''}${d.avg_win.toFixed(1)}% / ${d.avg_loss.toFixed(1)}%</div></div>
    <div class="kpi"><div class="label">总资产</div><div class="value">${(d.total_assets || 0).toLocaleString()}</div><div class="sub">现金 ${(d.cash || 0).toLocaleString()}</div></div>
  `;

  // Monthly
  if (d.monthly && d.monthly.length) {
    const maxAbs = Math.max(...d.monthly.map(m => Math.abs(m.pnl_sum)), 1);
    document.getElementById("monthlyChart").innerHTML = d.monthly.map(m => {
      const w = Math.abs(m.pnl_sum) / maxAbs * 100;
      const color = m.pnl_sum >= 0 ? "#22c55e" : "#ef4444";
      return `<div style="margin-bottom:6px;">
        <div style="display:flex; justify-content:space-between; font-size:12px;">
          <span>${m.month}</span>
          <span style="color:${color}">${m.pnl_sum >= 0 ? '+' : ''}${m.pnl_sum.toFixed(1)}%</span>
          <span style="color:#6b7280">${m.trades}笔 胜率${m.win_rate}%</span>
        </div>
        <div class="bar"><div class="bar-fill" style="width:${w}%; background:${color};"></div></div>
      </div>`;
    }).join("");
  }

  // Strategy
  if (d.by_strategy) {
    const items = Object.entries(d.by_strategy).sort((a, b) => b[1].pnl_sum - a[1].pnl_sum);
    document.getElementById("strategyBreakdown").innerHTML = `
      <table>
        <tr><th>来源</th><th>交易</th><th>胜率</th><th>累计盈亏</th></tr>
        ${items.map(([k, v]) => `
          <tr>
            <td>${k || '手动'}</td>
            <td>${v.trades}</td>
            <td>${v.win_rate}%</td>
            <td class="${v.pnl_sum >= 0 ? 'green' : 'red'}">${v.pnl_sum >= 0 ? '+' : ''}${v.pnl_sum.toFixed(1)}%</td>
          </tr>`).join("")}
      </table>`;
  }

  // Best/worst
  if (d.best && d.worst) {
    document.getElementById("bestWorst").innerHTML = `
      <div style="margin-bottom:12px;">
        <span class="tag tag-up">🏆 最佳</span>
        <b>${d.best.name}</b> (${d.best.code})
        ${d.best.buy_date} → ${d.best.sell_date}
        <span class="green">+${d.best.pnl_pct.toFixed(1)}%</span>
      </div>
      <div>
        <span class="tag tag-down">👎 最差</span>
        <b>${d.worst.name}</b> (${d.worst.code})
        ${d.worst.buy_date} → ${d.worst.sell_date}
        <span class="red">${d.worst.pnl_pct.toFixed(1)}%</span>
      </div>`;
  }

  // Holdings
  if (d.holdings && d.holdings.length) {
    document.getElementById("holdingsTable").innerHTML = `
      <table>
        <tr><th>股票</th><th>成本</th><th>现价</th><th>盈亏%</th><th>市值</th></tr>
        ${d.holdings.map(h => `
          <tr>
            <td><b>${h.name}</b> (${h.code})</td>
            <td>${h.buy_price.toFixed(2)}</td>
            <td>${h.cur_price.toFixed(2)}</td>
            <td class="${h.pnl_pct >= 0 ? 'green' : 'red'}">${h.pnl_pct >= 0 ? '+' : ''}${h.pnl_pct.toFixed(1)}%</td>
            <td>${h.mv.toLocaleString()}</td>
          </tr>`).join("")}
      </table>`;
  } else {
    document.getElementById("holdingsTable").innerHTML = '<div class="empty">空仓</div>';
  }
}

load();
</script>
</body>
</html>
