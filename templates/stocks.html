<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>个股行情 - A股数据面板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>if(typeof echarts==='undefined'){document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"><\/script>');}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
  }

  .nav {
    background: #161822;
    border-bottom: 1px solid #2a2d3e;
    padding: 0 28px;
    display: flex;
    align-items: center;
    height: 48px;
  }

  .brand {
    font-size: 14px;
    font-weight: 600;
    color: #e1e4e8;
    margin-right: 24px;
  }

  .nav a {
    text-decoration: none;
    color: #8b92a0;
    font-size: 13px;
    padding: 0 16px;
    height: 100%;
    display: flex;
    align-items: center;
    border-bottom: 2px solid transparent;
    transition: all .15s;
  }

  .nav a:hover,
  .nav a.on {
    color: #e1e4e8;
    border-bottom-color: #3b82f6;
  }

  .page {
    max-width: 1360px;
    margin: 0 auto;
    padding: 20px 24px 24px;
  }

  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }

  .search-box {
    flex: 1;
  }

  .search-box input {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2a2d3e;
    border-radius: 6px;
    padding: 8px 10px;
    height: 42px;
    display: block;
    outline: none;
    color: #e1e4e8;
    font-size: 13px;
  }

  .search-box input::placeholder {
    color: #6b7280;
  }

  .total {
    color: #9ca3af;
    font-size: 13px;
    white-space: nowrap;
  }

  .btn {
    height: 42px;
    padding: 0 16px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }

  .btn:hover {
    background: #1d4ed8;
  }

  .btn-ghost {
    height: 36px;
    padding: 0 14px;
    border: 1px solid #2a2d3e;
    border-radius: 6px;
    background: #161a22;
    color: #9ca3af;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-ghost:hover {
    color: #e1e4e8;
    border-color: #3b82f6;
  }

  .selected-info {
    display: none;
    align-items: center;
    gap: 8px;
    color: #3b82f6;
    font-size: 13px;
    white-space: nowrap;
  }
  .selected-info.visible { display: flex; }

  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 16px;
    align-items: start;
  }

  .panel {
    background: #161a22;
    border: 1px solid #262b36;
    border-radius: 10px;
    overflow: hidden;
  }

  .panel-head {
    padding: 14px 16px;
    border-bottom: 1px solid #262b36;
    font-size: 14px;
    font-weight: 600;
    color: #f3f4f6;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .table-wrap {
    max-height: calc(100vh - 190px);
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    position: sticky;
    top: 0;
    background: #1a1f29;
    color: #9ca3af;
    font-size: 12px;
    font-weight: 600;
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid #262b36;
  }

  td {
    padding: 12px 16px;
    font-size: 14px;
    border-bottom: 1px solid #20242e;
  }

  tr.clickable {
    cursor: pointer;
    user-select: none;
  }

  tr.clickable:hover td {
    background: #1c212c;
  }

  tr.selected td {
    background: #1a2638;
  }

  tr.selected td:first-child {
    box-shadow: inset 2px 0 0 #3b82f6;
  }

  .code {
    color: #cbd5e1;
    font-family: Consolas, monospace;
    font-size: 13px;
  }

  .name {
    color: #f3f4f6;
  }

  .mkt,
  .date {
    color: #9ca3af;
    font-size: 13px;
  }

  .pager {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 16px;
    border-top: 1px solid #262b36;
  }

  .pager button {
    min-width: 34px;
    height: 34px;
    padding: 0 10px;
    border: 1px solid #313846;
    border-radius: 8px;
    background: #1a1f29;
    color: #cbd5e1;
    font-size: 13px;
    cursor: pointer;
  }

  .pager button:hover {
    background: #222936;
  }

  .pager button.on {
    background: #2563eb;
    border-color: #2563eb;
    color: #fff;
  }

  .pager button:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .pager .info,
  .pager .dots {
    color: #9ca3af;
    font-size: 13px;
  }

  .pager .jump {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-left: 12px;
  }

  .pager .jump input {
    width: 52px;
    height: 34px;
    background: #0f1117;
    border: 1px solid #313846;
    border-radius: 8px;
    color: #e1e4e8;
    font-size: 13px;
    text-align: center;
    outline: none;
  }

  .pager .jump input:focus {
    border-color: #3b82f6;
  }

  .pager .jump button {
    min-width: 34px;
    height: 34px;
    padding: 0 8px;
    font-size: 12px;
  }

  .chart-panel {
    min-height: 760px;
    display: flex;
    flex-direction: column;
  }

  .chart-info {
    padding: 16px;
    border-bottom: 1px solid #262b36;
  }

  .chart-title {
    font-size: 18px;
    font-weight: 600;
    color: #f3f4f6;
  }

  .chart-meta {
    margin-top: 6px;
    font-size: 13px;
    color: #9ca3af;
  }

  #kline-chart {
    width: 100%;
    height: 680px;
  }

  #compare-chart {
    width: 100%;
    height: 680px;
    display: none;
  }

  .empty-chart,
  .empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    font-size: 14px;
  }

  .empty {
    padding: 48px 16px;
  }

  .empty-chart {
    min-height: 760px;
  }

  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    display: none;
    padding: 12px 16px;
    border-radius: 8px;
    background: #7f1d1d;
    color: #fecaca;
    border: 1px solid #991b1b;
  }

  .red { color: #f87171; }
  .green { color: #4ade80; }

  @media (max-width: 980px) {
    .layout {
      grid-template-columns: 1fr;
    }

    .table-wrap {
      max-height: none;
    }

    .chart-panel,
    .empty-chart {
      min-height: 520px;
    }

    #kline-chart, #compare-chart {
      height: 460px;
    }
  }

  @media (max-width: 640px) {
    .nav {
      padding: 0 16px;
      overflow-x: auto;
    }

    .page {
      padding: 16px;
    }

    .toolbar {
      flex-direction: column;
      align-items: stretch;
    }

    .btn {
      width: 100%;
    }
  }
</style>
</head>
<body>
<nav class="nav">
  <span class="brand">A股数据面板</span>
  <a href="/">首页</a>
  <a href="/stocks" class="on">个股</a>
  <a href="/concepts">概念</a>
  <a href="/strategy-backtest">策略回测</a>
</nav>

<div class="page">
  <div class="toolbar">
    <div class="search-box">
      <input id="q" placeholder="输入代码/名称，逗号分隔可批量搜索" onkeydown="if(event.key==='Enter')load(1)">
    </div>
    <span class="total" id="total-info">--</span>
    <span class="selected-info" id="selected-info">
      已选 <strong id="selected-count">0</strong> 只
      <button class="btn-ghost" onclick="clearSelection()">清除选择</button>
    </span>
    <button class="btn" onclick="load(1)">搜索</button>
  </div>

  <div class="layout">
    <div class="panel">
      <div class="panel-head">股票列表 <span style="font-weight:400;font-size:12px;color:#9ca3af;">点击多选，对比走势</span></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 110px;">代码</th>
              <th>名称</th>
              <th style="width: 72px;">市场</th>
              <th style="width: 110px;">上市日期</th>
            </tr>
          </thead>
          <tbody id="stock-tbody"></tbody>
        </table>
      </div>
      <div class="pager" id="pager"></div>
    </div>

    <div class="panel" id="chart-wrapper">
      <div class="empty-chart" id="chart-empty">点击左侧股票可多选，选1只显示K线，选多只显示对比走势</div>
      <div class="chart-panel" id="chart-panel" style="display:none;">
        <div class="chart-info">
          <div class="chart-title" id="chart-title"></div>
          <div class="chart-meta" id="chart-meta"></div>
        </div>
        <div id="kline-chart"></div>
        <div id="compare-chart"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const PER_PAGE = 10;

let page = 1;
let total = 0;
let chart;

// ======== 多选状态 ========
let selectedCodes = new Set();       // 已选股票代码
let selectedNames = new Map();       // code -> name
let allStockData = new Map();        // code -> daily array (已加载的数据缓存)

// 股票颜色表
const STOCK_COLORS = ["#3b82f6","#f97316","#a78bfa","#22c55e","#f43f5e","#eab308","#14b8a6","#fb7185","#60a5fa","#c084fc","#84cc16","#f59e0b","#2dd4bf","#818cf8","#f472b6","#ec4899","#06b6d4","#d946ef","#10b981","#6366f1"];

function stockColor(code) {
  let hash = 0;
  for (const ch of code) hash = (hash * 31 + ch.charCodeAt(0)) >>> 0;
  return STOCK_COLORS[hash % STOCK_COLORS.length];
}

function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(t._timer);
  t._timer = setTimeout(() => {
    t.style.display = "none";
  }, 3000);
}

function formatCount(v) {
  if (v === null || v === undefined || Number.isNaN(v)) return "--";
  return Number(v).toLocaleString();
}

function formatVolume(v) {
  if (!v) return "--";
  if (v >= 1e8) return `${(v / 1e8).toFixed(2)}亿`;
  if (v >= 1e4) return `${(v / 1e4).toFixed(0)}万`;
  return formatCount(v);
}

// ======== 选择状态 UI 更新 ========
function updateSelectionUI() {
  const count = selectedCodes.size;
  const info = $("selected-info");
  if (count > 0) {
    info.classList.add("visible");
    $("selected-count").textContent = count;
  } else {
    info.classList.remove("visible");
  }
  // 更新列表行高亮
  document.querySelectorAll("#stock-tbody tr").forEach(row => {
    const code = row.dataset.code;
    if (code && selectedCodes.has(code)) {
      row.classList.add("selected");
    } else {
      row.classList.remove("selected");
    }
  });
}

function clearSelection() {
  selectedCodes.clear();
  selectedNames.clear();
  updateSelectionUI();
  showEmptyChart();
}

// ======== 搜索/列表 ========
function splitQuery(q) {
  // 支持逗号、中文逗号、分号、顿号分隔
  return q.split(/[,，;；、\n]+/).map(s => s.trim()).filter(Boolean);
}

function isBatchQuery(q) {
  return /[,，;；、\n]/.test(q);
}

async function load(p) {
  const q = $("q").value.trim();
  if (!q) { page = p; await loadPage(p, ""); return; }

  if (isBatchQuery(q)) {
    // 批量搜索模式：按分隔符拆分，并行搜索每个词，合并去重后自动选中
    await batchSearch(splitQuery(q));
  } else {
    page = p;
    await loadPage(p, q);
  }
}

async function loadPage(p, q) {
  page = p;
  const url = `/api/stocks?page=${page}&per_page=${PER_PAGE}&q=${encodeURIComponent(q)}`;
  const r = await fetch(url).then(x => x.json());
  total = r.total || 0;
  $("total-info").textContent = q ? `搜索 "${q}" 共 ${formatCount(total)} 条` : `共 ${formatCount(total)} 条`;

  let html = "";
  if (!r.items || r.items.length === 0) {
    html = '<tr><td colspan="4" class="empty">没有匹配结果</td></tr>';
  } else {
    for (const s of r.items) {
      const sel = selectedCodes.has(s.code) ? " selected" : "";
      html += `<tr class="clickable${sel}" data-code="${s.code}" data-name="${s.name}" onclick="toggleStock(this)">
        <td class="code">${s.code}</td>
        <td class="name">${s.name}</td>
        <td class="mkt">${(s.market || "-").toUpperCase()}</td>
        <td class="date">${s.ipo_date || "-"}</td>
      </tr>`;
    }
  }
  $("stock-tbody").innerHTML = html;

  const pages = Math.max(1, Math.ceil(total / PER_PAGE));
  const items = [];
  items.push(`<button ${page <= 1 ? "disabled" : ""} onclick="load(${1})">首页</button>`);
  items.push(`<button ${page <= 1 ? "disabled" : ""} onclick="load(${page - 1})">上一页</button>`);

  let lastShown = 0;
  for (let i = 1; i <= pages; i++) {
    const shouldShow = pages <= 7 || i === 1 || i === pages || Math.abs(i - page) <= 1;
    if (!shouldShow) continue;
    if (lastShown && i - lastShown > 1) items.push('<span class="dots">...</span>');
    items.push(`<button class="${i === page ? "on" : ""}" onclick="load(${i})">${i}</button>`);
    lastShown = i;
  }

  items.push(`<button ${page >= pages ? "disabled" : ""} onclick="load(${page + 1})">下一页</button>`);
  items.push(`<button ${page >= pages ? "disabled" : ""} onclick="load(${pages})">末页</button>`);
  items.push(`<span class="jump">到第<input id="jump-page" type="text" value="${page}" onkeydown="if(event.key==='Enter')jumpToPage(${pages})"><button onclick="jumpToPage(${pages})">跳转</button></span>`);
  items.push(`<span class="info">${page} / ${pages} 页</span>`);
  $("pager").innerHTML = items.join("");
}

function jumpToPage(maxPage) {
  const input = document.getElementById("jump-page");
  if (!input) return;
  let p = parseInt(input.value, 10);
  if (isNaN(p) || p < 1) p = 1;
  if (p > maxPage) p = maxPage;
  load(p);
}

// ======== 批量搜索（逗号分隔多只股票） ========
async function batchSearch(terms) {
  $("total-info").textContent = `批量搜索 ${terms.length} 个关键词...`;

  // 并行搜索每个关键词（取前5条结果即可）
  const results = await Promise.all(terms.map(async (term) => {
    try {
      const url = `/api/stocks?page=1&per_page=5&q=${encodeURIComponent(term)}`;
      const r = await fetch(url).then(x => x.json());
      return { term, items: r.items || [] };
    } catch (e) {
      return { term, items: [] };
    }
  }));

  // 合并、去重（按code）
  const seen = new Set();
  const merged = [];
  const notFound = [];
  for (const { term, items } of results) {
    if (items.length === 0) {
      notFound.push(term);
      continue;
    }
    for (const s of items) {
      if (!seen.has(s.code)) {
        seen.add(s.code);
        merged.push(s);
      }
    }
  }

  // 显示合并结果
  total = merged.length;
  $("total-info").textContent = `批量搜索 ${terms.length} 词，找到 ${total} 只股票`;
  if (notFound.length > 0) {
    toast(`未找到: ${notFound.join("、")}`);
  }

  let html = "";
  if (merged.length === 0) {
    html = '<tr><td colspan="4" class="empty">没有匹配结果</td></tr>';
  } else {
    for (const s of merged) {
      html += `<tr class="clickable selected" data-code="${s.code}" data-name="${s.name}" onclick="toggleStock(this)">
        <td class="code">${s.code}</td>
        <td class="name">${s.name}</td>
        <td class="mkt">${(s.market || "-").toUpperCase()}</td>
        <td class="date">${s.ipo_date || "-"}</td>
      </tr>`;
    }
  }
  $("stock-tbody").innerHTML = html;
  $("pager").innerHTML = '<span class="info">批量结果，无分页</span>';

  // 自动全部选中
  selectedCodes.clear();
  selectedNames.clear();
  for (const s of merged) {
    selectedCodes.add(s.code);
    selectedNames.set(s.code, s.name);
  }
  updateSelectionUI();

  // 显示对比图
  if (merged.length >= 2) {
    await loadAndShowCompare();
  } else if (merged.length === 1) {
    const s = merged[0];
    await loadAndShowKline(s.code, s.name);
  } else {
    showEmptyChart();
  }
}

// ======== 切换股票选择 ========
async function toggleStock(row) {
  const code = row.dataset.code;
  const name = row.dataset.name;

  if (selectedCodes.has(code)) {
    // 取消选择
    selectedCodes.delete(code);
    selectedNames.delete(code);
  } else {
    // 加入选择
    selectedCodes.add(code);
    selectedNames.set(code, name);
  }

  updateSelectionUI();

  if (selectedCodes.size === 0) {
    showEmptyChart();
  } else if (selectedCodes.size === 1) {
    // 单只股票：K线图
    const singleCode = [...selectedCodes][0];
    await loadAndShowKline(singleCode, selectedNames.get(singleCode));
  } else {
    // 多只股票：对比图
    await loadAndShowCompare();
  }
}

// ======== 加载单只股票 K线 ========
async function loadAndShowKline(code, name) {
  // 使用缓存
  let data = allStockData.get(code);
  if (!data) {
    data = await fetch(`/api/stocks/${code}/daily`).then(x => x.json());
    if (!Array.isArray(data) || data.length === 0) {
      toast(`${name} 暂无日线数据`);
      return;
    }
    allStockData.set(code, data);
  }

  $("chart-empty").style.display = "none";
  $("chart-panel").style.display = "flex";
  $("kline-chart").style.display = "block";
  $("compare-chart").style.display = "none";

  const recent = data.slice(-250);
  renderKlineChart(name, code, recent);
  requestAnimationFrame(() => {
    if (chart) chart.resize();
  });
}

function renderKlineChart(name, code, data) {
  $("chart-title").textContent = `${name} (${code})`;

  const dates = data.map(d => d.trade_date);
  const ohlc = data.map(d => [d.open, d.close, d.low, d.high]);
  const volumes = data.map(d => d.volume || 0);
  const ma5 = calcMA(5, data);
  const ma10 = calcMA(10, data);
  const ma20 = calcMA(20, data);

  const firstClose = data[0]?.close || 1;
  const last = data[data.length - 1] || {};
  const lastClose = last.close || firstClose;
  const changePct = ((lastClose - firstClose) / firstClose * 100).toFixed(2);
  const colorCls = Number(changePct) >= 0 ? "red" : "green";
  const sign = Number(changePct) >= 0 ? "+" : "";

  const weekIdx = Math.max(0, data.length - 6);
  const monthIdx = Math.max(0, data.length - 21);
  const weekClose = data[weekIdx]?.close || lastClose;
  const monthClose = data[monthIdx]?.close || lastClose;
  const weekChg = ((lastClose - weekClose) / weekClose * 100);
  const monthChg = ((lastClose - monthClose) / monthClose * 100);
  const fmtChg = (v) => {
    const s = v >= 0 ? "+" : "";
    return `<span class="${v >= 0 ? 'red' : 'green'}">${s}${v.toFixed(2)}%</span>`;
  };

  const firstDate = data[0]?.trade_date || "";
  const lastDate = last.trade_date || "";
  $("chart-meta").innerHTML = `${firstDate} ~ ${lastDate} 共 ${data.length} 个交易日，最新收盘 ${lastClose.toFixed(2)}，<span class="${colorCls}">${sign}${changePct}%</span>，成交量 ${formatVolume(last.volume)}，1周涨跌 ${fmtChg(weekChg)}，1月涨跌 ${fmtChg(monthChg)}`;

  if (chart) {
    chart.dispose();
    chart = null;
  }
  chart = echarts.init($("kline-chart"));

  const upColor = "#ef4444";
  const downColor = "#22c55e";

  chart.setOption({
    backgroundColor: "transparent",
    animation: false,
    tooltip: {
      trigger: "axis",
      axisPointer: { type: "cross" },
      backgroundColor: "rgba(22, 26, 34, 0.96)",
      borderColor: "#374151",
      textStyle: { color: "#e5e7eb" }
    },
    axisPointer: {
      link: [{ xAxisIndex: "all" }],
      label: { backgroundColor: "#374151" }
    },
    legend: {
      top: 12,
      right: 16,
      textStyle: { color: "#9ca3af" }
    },
    grid: [
      { left: 56, right: 24, top: 48, height: "58%" },
      { left: 56, right: 24, top: "80%", height: "12%" }
    ],
    xAxis: [
      {
        type: "category",
        data: dates,
        gridIndex: 0,
        boundaryGap: true,
        axisLine: { lineStyle: { color: "#374151" } },

// ======== 多股对比图 ========
async function loadAndShowCompare() {
  // 并行加载未缓存的数据
  const toLoad = [];
  for (const code of selectedCodes) {
    if (!allStockData.has(code)) {
      toLoad.push(
        fetch(`/api/stocks/${code}/daily`)
          .then(x => x.json())
          .then(data => { allStockData.set(code, data); })
      );
    }
  }
  if (toLoad.length > 0) {
    await Promise.all(toLoad);
  }

  $("chart-empty").style.display = "none";
  $("chart-panel").style.display = "flex";
  $("kline-chart").style.display = "none";
  $("compare-chart").style.display = "block";

  renderCompareChart();
}

function renderCompareChart() {
  // 收集所有日期（各股票日期的并集），排序去重
  const dateSet = new Set();
  const stockSeries = []; // { code, name, color, dateMap: {date: close} }

  for (const code of selectedCodes) {
    const data = allStockData.get(code);
    if (!Array.isArray(data) || data.length === 0) continue;
    const name = selectedNames.get(code) || code;
    const dateMap = {};
    for (const d of data) {
      dateSet.add(d.trade_date);
      dateMap[d.trade_date] = d.close;
    }
    stockSeries.push({ code, name, color: stockColor(code), dateMap, data });
  }

  if (stockSeries.length === 0) {
    toast("所选股票暂无数据");
    return;
  }

  const allDates = [...dateSet].sort();

  // 为每只股票构建归一化价格序列（以该股首个有数据日期为基准 = 100）
  const seriesData = stockSeries.map(stock => {
    let firstClose = null;
    const values = [];
    // 先找到第一个有数据的日期对应的收盘价
    for (const date of allDates) {
      if (stock.dateMap[date] !== undefined) {
        firstClose = stock.dateMap[date];
        break;
      }
    }
    if (!firstClose) return null;

    let lastClose = null;
    for (const date of allDates) {
      const close = stock.dateMap[date];
      if (close !== undefined) {
        lastClose = close;
      }
      // 使用前向填充：没交易的日期沿用上一个收盘价
      const v = lastClose !== null ? (lastClose / firstClose * 100) : null;
      values.push(v !== null ? +v.toFixed(2) : null);
    }
    return {
      name: `${stock.name}(${stock.code})`,
      type: "line",
      symbol: "none",
      smooth: true,
      data: values,
      lineStyle: { color: stock.color, width: 2 },
      itemStyle: { color: stock.color },
    };
  }).filter(Boolean);

  // 更新标题
  const names = stockSeries.map(s => s.name).join(" / ");
  $("chart-title").textContent = `对比走势 — ${names}`;
  const dateRange = `${allDates[0] || ""} ~ ${allDates[allDates.length - 1] || ""}`;
  $("chart-meta").textContent = `${dateRange}  共 ${selectedCodes.size} 只股票，归一化基准=100`;

  // 销毁旧图表
  if (chart) {
    chart.dispose();
    chart = null;
  }
  chart = echarts.init($("compare-chart"));

  chart.setOption({
    backgroundColor: "transparent",
    animation: false,
    tooltip: {
      trigger: "axis",
      backgroundColor: "rgba(22, 26, 34, 0.96)",
      borderColor: "#374151",
      textStyle: { color: "#e5e7eb" },
      formatter: function(params) {
        let html = `<div style="font-weight:600;margin-bottom:4px;">${params[0]?.axisValue || ""}</div>`;
        for (const p of params) {
          if (p.value !== null && p.value !== undefined) {
            html += `<div style="display:flex;align-items:center;gap:8px;margin:2px 0;">
              <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${p.color};"></span>
              <span>${p.seriesName}</span>
              <span style="font-weight:600;margin-left:auto;">${p.value.toFixed(2)}</span>
            </div>`;
          }
        }
        return html;
      }
    },
    legend: {
      top: 8,
      right: 16,
      textStyle: { color: "#9ca3af", fontSize: 11 },
      type: "scroll",
    },
    grid: { left: 60, right: 24, top: 48, bottom: 36 },
    xAxis: {
      type: "category",
      data: allDates,
      boundaryGap: false,
      axisLine: { lineStyle: { color: "#374151" } },
      axisTick: { show: false },
      axisLabel: {
        color: "#9ca3af",
        fontSize: 10,
        formatter: value => value.slice(5),
        interval: Math.max(1, Math.floor(allDates.length / 12)),
      },
      splitLine: { show: false },
    },
    yAxis: {
      type: "value",
      scale: true,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: {
        color: "#9ca3af",
        fontSize: 10,
        formatter: value => value.toFixed(0),
      },
      splitLine: { lineStyle: { color: "#222936", type: "dashed" } },
      name: "基准=100",
      nameTextStyle: { color: "#9ca3af", fontSize: 11 },
    },
    dataZoom: [
      { type: "inside", start: 0, end: 100 }
    ],
    series: seriesData,
  });

  setTimeout(() => {
    if (chart) chart.resize();
  }, 0);
}

// ======== 空状态 ========
function showEmptyChart() {
  $("chart-empty").style.display = "flex";
  $("chart-panel").style.display = "none";
  $("kline-chart").style.display = "block";
  $("compare-chart").style.display = "none";
  if (chart) {
    chart.dispose();
    chart = null;
  }
}

// ======== MA 计算 ========
function calcMA(day, data) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    if (i < day - 1) {
      result.push(null);
      continue;
    }
    let sum = 0;
    for (let j = 0; j < day; j++) sum += data[i - j].close || 0;
    result.push(+(sum / day).toFixed(2));
  }
  return result;
}

window.addEventListener("resize", () => {
  if (chart) chart.resize();
});

load(1);
