<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>交易复盘 — 操作原因统计</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
  }

  /* Nav */
  .nav {
    background: #161822;
    border-bottom: 1px solid #2a2d3e;
    padding: 0 28px;
    display: flex;
    align-items: center;
    height: 48px;
  }
  .nav a { color: #8b92a0; text-decoration: none; font-size: 13px; padding: 0 16px; height: 100%; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: all .15s; }
  .nav a:hover, .nav a.on { color: #e1e4e8; border-bottom-color: #3b82f6; }
  .nav .brand { font-weight: 600; color: #e1e4e8; margin-right: 24px; font-size: 14px; }

  /* Layout */
  .main { max-width: 1000px; margin: 0 auto; padding: 20px 24px; }

  /* Cards bar */
  .cards-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-card {
    background: #161822; border: 1px solid #2a2d3e; border-radius: 10px; padding: 16px 18px;
  }
  .stat-card .label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 700; }
  .stat-card .value.green { color: #22c55e; }
  .stat-card .value.red { color: #ef4444; }
  .stat-card .value.blue { color: #60a5fa; }
  .stat-card .sub { font-size: 11px; color: #6b7280; margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 18px; border-bottom: 1px solid #2a2d3e; }
  .tab-btn {
    background: none; border: none; color: #6b7280; font-size: 14px; padding: 10px 20px;
    cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s;
    font-family: inherit;
  }
  .tab-btn:hover { color: #d1d5db; }
  .tab-btn.active { color: #e1e4e8; border-bottom-color: #3b82f6; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; padding: 10px 12px; color: #6b7280; font-weight: 500;
    border-bottom: 1px solid #2a2d3e; background: #161822;
    position: sticky; top: 0; z-index: 1;
  }
  tbody td { padding: 10px 12px; border-bottom: 1px solid #1a1c2a; }
  tbody tr:hover { background: #161822; }
  .g { color: #22c55e; font-weight: 600; }
  .r { color: #ef4444; font-weight: 600; }

  /* Buttons */
  .btn {
    background: #1e2030; color: #e1e4e8; border: 1px solid #2a2d3e; border-radius: 6px;
    padding: 6px 14px; font-size: 12px; cursor: pointer; transition: all .15s; font-family: inherit;
  }
  .btn:hover { border-color: #3b82f6; background: #262a3a; }
  .btn-danger { border-color: #7f1d1d; color: #fca5a5; }
  .btn-danger:hover { background: #3b1515; border-color: #ef4444; }
  .btn-primary { background: #1d4ed8; border-color: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #1e40af; }
  .btn-sm { padding: 3px 10px; font-size: 11px; }

  /* Forms */
  .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: #6b7280; }
  .form-group input, .form-group select {
    background: #161822; color: #e1e4e8; border: 1px solid #2a2d3e; border-radius: 6px;
    padding: 8px 12px; font-size: 13px; font-family: inherit; width: 140px;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #3b82f6; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #161822; border: 1px solid #2a2d3e; border-radius: 14px; padding: 28px;
    width: 400px; max-width: 90vw;
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal .btn-row { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

  /* Toast */
  .toast {
    position: fixed; top: 20px; right: 20px; z-index: 200;
    padding: 10px 20px; border-radius: 8px; font-size: 13px;
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.ok { background: #14532d; color: #86efac; border: 1px solid #22c55e; }
  .toast.err { background: #450a0a; color: #fca5a5; border: 1px solid #ef4444; }

  /* Empty state */
  .empty { text-align: center; padding: 48px; color: #6b7280; font-size: 14px; }

  .review-grid { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr); gap: 18px; }
  .review-panel { background:#161822; border:1px solid #2a2d3e; border-radius:8px; padding:14px; }
  .review-panel h3 { font-size:15px; margin-bottom:12px; }
  .textarea {
    width:100%; background:#10131c; color:#e1e4e8; border:1px solid #2a2d3e; border-radius:6px;
    padding:9px 11px; font-size:13px; font-family:inherit; resize:vertical; line-height:1.5;
  }
  .textarea:focus { outline:none; border-color:#3b82f6; }
  .review-row { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:10px; margin-bottom:10px; }
  .review-stat-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:12px; }
  .review-stat { background:#10131c; border:1px solid #24283a; border-radius:8px; padding:10px; }
  .review-stat .k { color:#6b7280; font-size:11px; margin-bottom:4px; }
  .review-stat .v { font-size:18px; font-weight:700; }
  .trade-pill { display:inline-flex; align-items:center; gap:6px; padding:4px 8px; border:1px solid #2a2d3e; border-radius:999px; font-size:11px; margin:3px; color:#cbd5e1; background:#11151c; }
  .tag { display:inline-block; padding:2px 7px; border-radius:999px; font-size:10px; }
  .emo-btn {
    background:#11151c; color:#8b92a0; border:1px solid #2a2d3e; border-radius:6px;
    padding:5px 12px; font-size:12px; cursor:pointer; transition:all .15s; font-family:inherit;
  }
  .emo-btn:hover { border-color:#6b7280; color:#d1d5db; }
  .emo-btn.on { background:#1d3a5c; border-color:#3b82f6; color:#93c5fd; }

  /* Responsive */
  @media (max-width: 700px) {
    .cards-bar { grid-template-columns: repeat(2, 1fr); }
    .form-row { flex-direction: column; }
    .review-grid, .review-row { grid-template-columns: 1fr; }
    .review-stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav class="nav">
  <span class="brand">A股数据面板</span>
  <a href="/">首页</a>
  <a href="/stocks">个股</a>
  <a href="/concepts">概念</a>
  <a href="/strategy-backtest">策略回测</a>
  <a href="/strategy-lab">策略试验</a>
  <a href="/trading" class="on">交易复盘</a>
</nav>

<div class="main">

  <!-- Stats bar -->
  <div class="cards-bar" id="statsBar"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="tab-holdings">当前持仓</button>
    <button class="tab-btn" data-tab="tab-operate">手动操作</button>
    <button class="tab-btn" data-tab="tab-history">历史记录</button>
    <button class="tab-btn" data-tab="tab-compare">策略对比</button>
    <button class="tab-btn" data-tab="tab-journal">原因复盘</button>
  </div>

  <!-- Tab 1: 持仓 -->
  <div class="tab-content active" id="tab-holdings">
    <table id="holdingsTable">
      <thead><tr><th>代码</th><th>名称</th><th>买入价</th><th>现价</th><th>股数</th><th>市值</th><th>盈亏%</th><th>持仓天</th><th>平仓预警</th><th>操作</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="empty" id="emptyHoldings" style="display:none">暂无持仓，去「手动操作」页记录买入</div>
  </div>

  <!-- Tab 2: 操作 -->
  <div class="tab-content" id="tab-operate">
    <h3 style="font-size:15px; margin-bottom:12px;">买入记录</h3>
    <div class="form-row" id="buyForm">
      <div class="form-group"><label>股票代码</label><input id="buyCode" placeholder="sz.002303"></div>
      <div class="form-group"><label>买入价</label><input id="buyPrice" type="number" step="0.01" placeholder="3.68"></div>
      <div class="form-group"><label>股数</label><input id="buyShares" type="number" step="100" value="100"></div>
      <div class="form-group"><label>买入日期</label><input id="buyDate" type="date"></div>
      <div class="form-group"><label>策略来源</label><select id="buyStrategySource"><option value="">手动/主观</option><option value="market_bottom">market_bottom</option><option value="vegas_tunnel">vegas_tunnel</option><option value="alpha042">alpha042</option><option value="daily_guide">V反(daily_guide)</option><option value="price_volume_rising">价增量增</option></select></div>
      <div class="form-group"><label>信号排名</label><input id="buySignalRank" type="number" min="1" placeholder="在策略推荐中的排名" style="width:80px"></div>
      <div class="form-group"><label>大盘信号</label><select id="buyMarketSignal"><option value="">未知</option><option value="GREEN">GREEN</option><option value="YELLOW">YELLOW</option><option value="RED">RED</option></select></div>
      <div class="form-group"><label>原因</label><input id="buyReason" placeholder="如: market_bottom买入信号" style="width:200px"></div>
      <div class="form-group"><label>备注</label><input id="buyDecisionNote" placeholder="决策备注（可选）" style="width:200px"></div>
      <button class="btn btn-primary" onclick="doBuy()">记录买入</button>
    </div>

    <h3 style="font-size:15px; margin:28px 0 12px;">卖出操作</h3>
    <div class="form-row" id="sellForm">
      <div class="form-group"><label>持仓股票</label><select id="sellCode"></select></div>
      <div class="form-group"><label>卖出价</label><input id="sellPrice" type="number" step="0.01"></div>
      <div class="form-group"><label>股数(0=全卖)</label><input id="sellShares" type="number" step="100" value="0"></div>
      <div class="form-group"><label>卖出日期</label><input id="sellDate" type="date"></div>
      <div class="form-group"><label>原因</label><input id="sellReason" placeholder="如: 止损/止盈/破MA20" style="width:200px"></div>
      <button class="btn btn-danger" onclick="doSell()">记录卖出</button>
    </div>
  </div>

  <!-- Tab 3: 历史 -->
  <div class="tab-content" id="tab-history">
    <div style="margin-bottom:14px; display:flex; gap:20px; font-size:13px; color:#6b7280;" id="historyStats"></div>
    <table id="historyTable">
      <thead><tr><th>日期</th><th>代码</th><th>名称</th><th>方向</th><th>价格</th><th>股数</th><th>盈亏</th><th>盈亏%</th><th>卖后3d</th><th>5d</th><th>10d</th><th>20d</th><th>至今</th><th>原因</th><th>复盘</th></tr></thead>
      <tbody></tbody>
    </table>
    <div id="historyPager" style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:14px;font-size:13px;color:#6b7280;"></div>
    <div class="empty" id="emptyHistory" style="display:none">暂无记录</div>
  </div>

  <!-- Tab 4: 策略对比 -->
  <div class="tab-content" id="tab-compare">
    <div style="margin-bottom:14px; display:flex; gap:20px; font-size:13px;" id="compareSummary"></div>

    <!-- 区1: 持仓对照 (策略 vs 你) -->
    <h3 style="font-size:14px; margin-bottom:8px; color:#60a5fa;">持仓对照 (策略 vs 你)</h3>
    <table id="compareHoldsTable">
      <thead><tr><th>代码</th><th>名称</th><th>策略</th><th>策略买入日</th><th>策略价</th><th>策略盈亏</th><th>你</th><th>你买入价</th><th>你现价</th><th>你盈亏</th><th>持仓天</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="empty" id="emptyHolds" style="display:none">暂无持仓数据</div>

    <!-- 区2: 策略买入信号 -->
    <h3 style="font-size:14px; margin:24px 0 8px; color:#ef4444;">策略买入信号 (全市场扫描)</h3>
    <table id="compareBuyTable">
      <thead><tr><th>排名</th><th>代码</th><th>名称</th><th>评分</th><th>收盘</th><th>5日涨</th><th>量比</th><th>涨跌量比</th><th>原因</th><th>跟了?</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="empty" id="emptyBuys" style="display:none">暂无买入信号</div>
  </div>

  <!-- Tab 5: 原因复盘 -->
  <div class="tab-content" id="tab-journal">
    <div id="reviewReminder" style="display:none; background:#1e1b0a; border:1px solid #f59e0b; border-radius:8px; padding:12px 16px; margin-bottom:16px; align-items:center; gap:12px;">
      <span style="font-size:13px;"><b id="reviewReminderDate"></b> 这笔还没复盘，先把当时原因写清楚。</span>
      <button class="btn btn-sm" style="border-color:#f59e0b;color:#f59e0b;" onclick="reviewYesterday()" id="reviewReminderBtn">去复盘</button>
    </div>

    <div class="review-grid">
      <div class="review-panel">
        <h3>交易原因</h3>
        <div class="review-row">
          <div class="form-group" style="width:100%;">
            <label>日期</label>
            <input id="journalDate" type="date" style="width:100%" onchange="renderDayTrades()">
          </div>
          <div class="form-group" style="width:100%;">
            <label>当天情绪</label>
            <div id="journalEmotion" style="display:flex;flex-wrap:wrap;gap:6px;">
              <button class="emo-btn" data-v="冷静" onclick="toggleEmotion(this)">冷静</button>
              <button class="emo-btn" data-v="兴奋" onclick="toggleEmotion(this)">兴奋</button>
              <button class="emo-btn" data-v="恐惧" onclick="toggleEmotion(this)">恐惧</button>
              <button class="emo-btn" data-v="不甘心" onclick="toggleEmotion(this)">不甘心</button>
              <button class="emo-btn" data-v="急着回本" onclick="toggleEmotion(this)">急着回本</button>
              <button class="emo-btn" data-v="随手单" onclick="toggleEmotion(this)">随手单</button>
              <button class="emo-btn" data-v="贪婪" onclick="toggleEmotion(this)">贪婪</button>
            </div>
          </div>
        </div>

        <div style="margin-bottom:12px;">
          <label style="font-size:12px; color:#6b7280; display:block; margin-bottom:6px;">当天流水</label>
          <div id="dayTradeList" style="min-height:28px;"></div>
        </div>

        <div class="review-row">
          <div class="form-group" style="width:100%;">
            <label>操作类型</label>
            <select id="journalTradeType" style="width:100%">
              <option value="">混合/未选</option>
              <option value="计划内买入">计划内买入</option>
              <option value="追高买入">追高买入</option>
              <option value="低吸买入">低吸买入</option>
              <option value="补仓">补仓</option>
              <option value="做T">做T</option>
              <option value="止盈">止盈</option>
              <option value="止损">止损</option>
              <option value="割肉">割肉</option>
              <option value="空仓/没操作">空仓/没操作</option>
            </select>
          </div>
          <div class="form-group" style="width:100%;">
            <label>是否按计划</label>
            <select id="journalPlanFollowed" style="width:100%">
              <option value="">未判断</option>
              <option value="是">是，按计划</option>
              <option value="否">否，盘中变形</option>
              <option value="部分">部分符合</option>
              <option value="无计划">当时没计划</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="width:100%; margin-bottom:10px;">
          <label>当时原因</label>
          <textarea id="journalRationale" class="textarea" rows="4" placeholder="当时我为什么买/卖？看到什么信号？是题材、形态、消息、策略、恐惧，还是想回本？"></textarea>
        </div>
        <div class="form-group" style="width:100%; margin-bottom:10px;">
          <label>当时预期</label>
          <textarea id="journalExpectation" class="textarea" rows="2" placeholder="我当时预期它接下来怎么走？如果错了，什么条件说明我错了？"></textarea>
        </div>
        <div class="form-group" style="width:100%; margin-bottom:10px;">
          <label>实际结果</label>
          <textarea id="journalOutcome" class="textarea" rows="2" placeholder="后面走势验证了什么？亏损/盈利主要来自判断、仓位、卖点，还是市场环境？"></textarea>
        </div>

        <div style="margin-bottom:14px; padding:12px; background:#11151c; border:1px solid #2a2d3e; border-radius:8px;">
          <label style="font-size:12px; color:#6b7280; display:block; margin-bottom:6px;">判断对错</label>
          <div style="display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;">
            <button class="btn btn-sm" id="reviewBtnRight" onclick="setReview('对')" style="border-color:#22c55e;color:#22c55e;">对</button>
            <button class="btn btn-sm" id="reviewBtnWrong" onclick="setReview('错')" style="border-color:#ef4444;color:#ef4444;">错</button>
            <button class="btn btn-sm" id="reviewBtnHalf" onclick="setReview('半对')" style="border-color:#f59e0b;color:#f59e0b;">半对</button>
            <span id="reviewVerdict" style="font-size:13px;align-self:center;"></span>
          </div>
          <textarea id="journalReviewNote" class="textarea" rows="2" placeholder="具体哪里对/错？不是涨跌对错，而是当时逻辑和执行是否成立。"></textarea>
        </div>

        <div class="review-row">
          <div class="form-group" style="width:100%;">
            <label>错误类型</label>
            <div id="journalMistakeType" style="display:flex;flex-wrap:wrap;gap:6px;">
              <button class="emo-btn" data-v="无错误" onclick="toggleMistakeBtn(this)">无错误</button>
              <button class="emo-btn" data-v="追高" onclick="toggleMistakeBtn(this)">追高</button>
              <button class="emo-btn" data-v="卖点拖延" onclick="toggleMistakeBtn(this)">卖点拖延</button>
              <button class="emo-btn" data-v="止损不坚决" onclick="toggleMistakeBtn(this)">止损不坚决</button>
              <button class="emo-btn" data-v="仓位过重" onclick="toggleMistakeBtn(this)">仓位过重</button>
              <button class="emo-btn" data-v="逆势交易" onclick="toggleMistakeBtn(this)">逆势交易</button>
              <button class="emo-btn" data-v="题材退潮" onclick="toggleMistakeBtn(this)">题材退潮</button>
              <button class="emo-btn" data-v="频繁交易" onclick="toggleMistakeBtn(this)">频繁交易</button>
              <button class="emo-btn" data-v="情绪单" onclick="toggleMistakeBtn(this)">情绪单</button>
              <button class="emo-btn" data-v="未按策略" onclick="toggleMistakeBtn(this)">未按策略</button>
            </div>
          </div>
          <div class="form-group" style="width:100%;">
            <label>执行评分</label>
            <select id="journalScore" style="width:100%">
              <option value="">未评分</option>
              <option value="5">5 很好</option>
              <option value="4">4 基本正确</option>
              <option value="3">3 一半一半</option>
              <option value="2">2 明显变形</option>
              <option value="1">1 情绪主导</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="width:100%; margin-bottom:10px;">
          <label>下次规则</label>
          <textarea id="journalLessons" class="textarea" rows="3" placeholder="写成能执行的规则：例如连续亏损后半仓；涨停炸板不追回；亏损超过 -3% 必须减仓。"></textarea>
        </div>
        <div class="form-group" style="width:100%; margin-bottom:14px;">
          <label>明日计划</label>
          <textarea id="journalPlan" class="textarea" rows="2" placeholder="明天只写条件：什么情况买，什么情况卖，什么情况不做。"></textarea>
        </div>

        <button class="btn btn-primary" onclick="saveJournal()">保存复盘</button>
        <button class="btn btn-sm" style="border-color:#a78bfa;color:#a78bfa;" onclick="goToReviewedTrade()">跳转记录</button>
        <button class="btn" onclick="clearJournalForm()">清空表单</button>
        <span id="journalMsg" style="margin-left:12px; font-size:12px; color:#22c55e;"></span>
      </div>

      <div>
        <div class="review-panel" style="margin-bottom:12px;">
          <h3>统计</h3>
          <div class="review-stat-grid" id="journalStats"></div>
          <div id="mistakeStats" style="font-size:12px; color:#9ca3af; line-height:1.8;"></div>
        </div>
        <div class="review-panel">
          <h3>历史复盘 <span style="font-weight:400;font-size:12px;color:#6b7280;" id="journalCount"></span></h3>
          <div style="max-height:560px; overflow-y:auto;" id="journalList">
            <div class="empty">加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Sell Modal -->
<div class="modal-overlay" id="sellModal">
  <div class="modal">
    <h3>确认卖出 <span id="sellModalName"></span></h3>
    <div class="form-group" style="width:100%"><label>卖出价</label><input id="sellModalPrice" type="number" step="0.01" style="width:100%"></div>
    <div class="form-group" style="width:100%;margin-top:8px"><label>原因</label><input id="sellModalReason" placeholder="如: 止损/止盈/破MA20" style="width:100%"></div>
    <div class="btn-row">
      <button class="btn" onclick="closeSellModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmSell()">确认卖出</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ State ============
let state = { portfolio: null, logs: [], stats: {} };

// ============ Init ============
document.addEventListener("DOMContentLoaded", () => {
  // Tabs
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      document.getElementById(btn.dataset.tab).classList.add("active");
      // 切换到复盘 tab 时刷新当天流水
      if (btn.dataset.tab === "tab-journal") {
        renderDayTrades();
      }
    });
  });

  // Default date = today
  const today = new Date().toISOString().slice(0,10);
  document.getElementById("buyDate").value = today;
  document.getElementById("sellDate").value = today;
  // 复盘日期默认用最近的交易日（有数据的那天），否则用今天
  document.getElementById("journalDate").value = today;

  refresh().then(() => {
    // 如果有交易数据，journalDate 跳到最近交易日
    if (state.logs && state.logs.length > 0) {
      const lastDate = state.logs[state.logs.length - 1].date;
      document.getElementById("journalDate").value = lastDate;
    }
    renderDayTrades();
    // 等 state.logs 就绪后再加载复盘列表
    return loadJournalList();
  }).then(() => {
    // 加载完复盘数据后重绘历史，显示"已复盘"标记
    renderHistory();
    return checkReviewReminder();
  });
});

async function refresh() {
  const r = await fetch("/api/trading/state");
  state = await r.json();
  renderStats();
  renderHoldings();
  renderSellSelect();
  renderHistory();
  renderCompare();
}

// ============ Stats ============
function renderStats() {
  const p = state.portfolio;
  const s = state.stats;
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-card"><div class="label">总市值</div><div class="value blue">${fmtMoney(s.totalValue)}</div><div class="sub">现金 ${fmtMoney(p.cash)}</div></div>
    <div class="stat-card"><div class="label">持仓市值</div><div class="value">${fmtMoney(s.holdingValue)}</div><div class="sub">${p.holdings.length}/${p.max_positions} 仓</div></div>
    <div class="stat-card"><div class="label">浮动盈亏</div><div class="value ${s.totalPnl >= 0 ? 'green' : 'red'}">${s.totalPnl >= 0 ? '+' : ''}${fmtMoney(s.totalPnl)}</div><div class="sub ${s.totalPnlPct >= 0 ? 'g' : 'r'}">${s.totalPnlPct >= 0 ? '+' : ''}${s.totalPnlPct.toFixed(2)}%</div></div>
    <div class="stat-card"><div class="label">累计已实现</div><div class="value ${s.realizedPnl >= 0 ? 'green' : 'red'}">${s.realizedPnl >= 0 ? '+' : ''}${fmtMoney(s.realizedPnl)}</div><div class="sub">${s.closedTrades}笔 / 胜率${s.winRate.toFixed(0)}%</div></div>
  `;
}

// ============ Holdings ============
function renderHoldings() {
  const h = state.holdings || [];
  const tbody = document.querySelector("#holdingsTable tbody");
  const empty = document.getElementById("emptyHoldings");

  if (!h.length) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  tbody.innerHTML = h.map(r => {
    const pnlCls = r.pnlPct >= 0 ? "g" : "r";
    const pnlSign = r.pnlPct >= 0 ? "+" : "";
    const a = r.alerts || {};

    // 找最近的危险线
    let alertHtml = "-";
    if (a.stopLoss) {
      // 收集所有价格线
      const priceLines = [];
      if (a.highRetreat) priceLines.push({label:"高位回撤", price:a.highRetreat, dist:a.highRetreatDist});
      if (a.stopLoss) priceLines.push({label:"止损", price:a.stopLoss, dist:a.stopLossDist});
      if (a.ma10) priceLines.push({label:"MA10", price:a.ma10, dist:a.ma10Dist});

      // 按距现价从近到远排序（dist 正值=现价在上方，越小越危险）
      priceLines.sort((a,b) => a.dist - b.dist);
      const nearest = priceLines[0];

      // 量条件
      if (a.volDiverge) priceLines.push({label:"量价背离", price:null, dist:0});

      // 高亮最近线
      alertHtml = priceLines.map(l => {
        if (l.label === "量价背离") {
          return `<span style="color:#f59e0b">量价背离</span>`;
        }
        const distPct = (l.dist>0?"-":"") + Math.abs(l.dist).toFixed(1)+"%";
        const isNearest = l === nearest && l.dist < 5;
        const style = isNearest
          ? 'color:#ef4444;font-weight:700;font-size:12px'
          : 'color:#6b7280;font-size:11px';
        return `<span style="${style}">${l.label} ${l.price.toFixed(2)}<br><span style="font-size:10px">(${distPct})</span></span>`;
      }).join("<br>");
    }
    return `<tr>
      <td>${r.code}</td><td>${r.name}</td>
      <td>${fmtPrice(r.buy_price)}</td><td>${fmtPrice(r.currentPrice)}</td>
      <td>${r.shares}</td><td>${fmtMoney(r.marketValue)}</td>
      <td class="${pnlCls}">${pnlSign}${r.pnlPct.toFixed(2)}%</td>
      <td>${r.holdDays}天</td>
      <td>${alertHtml}</td>
      <td><button class="btn btn-sm btn-danger" onclick="openSellModal('${r.code}','${r.name}',${r.currentPrice},${r.shares})">卖出</button></td>
    </tr>`;
  }).join("");
}

// ============ Sell modal ============
let sellTarget = null;
function openSellModal(code, name, price, shares) {
  sellTarget = { code, name, price, shares };
  document.getElementById("sellModalName").textContent = `${code} ${name}`;
  document.getElementById("sellModalPrice").value = price;
  document.getElementById("sellModal").classList.add("show");
}
function closeSellModal() {
  document.getElementById("sellModal").classList.remove("show");
  sellTarget = null;
}
async function confirmSell() {
  if (!sellTarget) return;
  const price = parseFloat(document.getElementById("sellModalPrice").value);
  const reason = document.getElementById("sellModalReason").value.trim();
  if (!price || price <= 0) { toast("请输入有效卖出价", "err"); return; }
  const today = new Date().toISOString().slice(0,10);
  await api("sell", { code: sellTarget.code, price, shares: sellTarget.shares, date: today, reason });
  closeSellModal();
  refresh();
}

// ============ Buy ============
async function doBuy() {
  const code = document.getElementById("buyCode").value.trim();
  const price = parseFloat(document.getElementById("buyPrice").value);
  const shares = parseInt(document.getElementById("buyShares").value);
  const date = document.getElementById("buyDate").value;
  const reason = document.getElementById("buyReason").value.trim();
  const strategySource = document.getElementById("buyStrategySource").value;
  const signalRank = parseInt(document.getElementById("buySignalRank").value) || null;
  const marketSignal = document.getElementById("buyMarketSignal").value;
  const decisionNote = document.getElementById("buyDecisionNote").value.trim();
  if (!code) { toast("请输入股票代码", "err"); return; }
  if (!price || price <= 0) { toast("请输入有效买入价", "err"); return; }
  if (!shares || shares < 100) { toast("最少100股", "err"); return; }
  await api("buy", { code, price, shares, date, reason, strategy_source: strategySource, signal_rank: signalRank, market_signal: marketSignal, decision_note: decisionNote });
  document.getElementById("buyCode").value = "";
  document.getElementById("buyPrice").value = "";
  document.getElementById("buyShares").value = "100";
  document.getElementById("buyReason").value = "";
  document.getElementById("buyDecisionNote").value = "";
  refresh();
}

// ============ Sell (from operate tab) ============
async function doSell() {
  const code = document.getElementById("sellCode").value;
  const price = parseFloat(document.getElementById("sellPrice").value);
  let shares = parseInt(document.getElementById("sellShares").value);
  const date = document.getElementById("sellDate").value;
  const reason = document.getElementById("sellReason").value.trim();
  if (!code) { toast("请选择持仓股票", "err"); return; }
  if (!price || price <= 0) { toast("请输入有效卖出价", "err"); return; }
  if (shares === 0) {
    const h = (state.holdings || []).find(r => r.code === code);
    shares = h ? h.shares : 0;
  }
  if (shares < 100) { toast("最少100股", "err"); return; }
  await api("sell", { code, price, shares, date, reason });
  document.getElementById("sellPrice").value = "";
  document.getElementById("sellShares").value = "0";
  document.getElementById("sellReason").value = "";
  refresh();
}

// ============ History ============
let _historyPage = 1;
const _historyPageSize = 10;

function renderHistory() {
  const logs = state.logs || [];
  const tbody = document.querySelector("#historyTable tbody");
  const empty = document.getElementById("emptyHistory");
  const statsDiv = document.getElementById("historyStats");

  if (!logs.length) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    statsDiv.innerHTML = "";
    document.getElementById("historyPager").style.display = "none";
    return;
  }
  empty.style.display = "none";

  // Stats
  const closed = logs.filter(l => l.action === "sell");
  const wins = closed.filter(l => l.pnl > 0).length;
  const totalPnl = closed.reduce((s, l) => s + l.pnl, 0);
  const winRate = closed.length ? (wins / closed.length * 100) : 0;
  const reviewedCount = [..._reviewedTradeIds].filter(id => logs.some(l => l.id === id)).length;
  statsDiv.innerHTML = `
    <span>总操作 <b style="color:#e1e4e8">${logs.length}</b> 次</span>
    <span>已平仓 <b style="color:#e1e4e8">${closed.length}</b> 笔</span>
    <span>胜率 <b style="color:#22c55e">${winRate.toFixed(0)}%</b></span>
    <span>已实现盈亏 <b style="color:${totalPnl>=0?'#22c55e':'#ef4444'}">${totalPnl>=0?'+':''}${fmtMoney(totalPnl)}</b></span>
    <span>已复盘 <b style="color:#a78bfa">${reviewedCount}</b> 笔</span>
  `;

  // Pagination
  const reversed = [...logs].reverse();
  const totalPages = Math.ceil(reversed.length / _historyPageSize);
  if (_historyPage > totalPages) _historyPage = totalPages;
  if (_historyPage < 1) _historyPage = 1;
  const start = (_historyPage - 1) * _historyPageSize;
  const pageLogs = reversed.slice(start, start + _historyPageSize);

  // Table - newest first
  tbody.innerHTML = pageLogs.map(l => {
    const dir = l.action === "buy" ? '<span style="color:#ef4444">买入</span>' : '<span style="color:#22c55e">卖出</span>';
    let pnlCell = "-", pnlPctCell = "-";
    let fwdCells = "";
    if (l.action === "sell") {
      const cls = l.pnl >= 0 ? "g" : "r";
      pnlCell = `<span class="${cls}">${l.pnl >= 0 ? '+' : ''}${fmtMoney(l.pnl)}</span>`;
      pnlPctCell = `<span class="${cls}">${l.pnl >= 0 ? '+' : ''}${(l.pnlPct||0).toFixed(2)}%</span>`;
      // 前向涨跌 - 直接用预生成的 HTML，如果没有则 fallback 到对象
      if (l.fwdHtml) {
        fwdCells = l.fwdHtml;
      } else {
        const fwd = l.forward || {};
        const d3 = fwd['fwd_3d'], d5 = fwd['fwd_5d'], d10 = fwd['fwd_10d'], d20 = fwd['fwd_20d'], now = fwd['fwd_now'];
        fwdCells =
          (d3 != null ? `<td class="${d3>=0?'g':'r'}" style="font-size:11px">${d3>=0?'+':''}${d3.toFixed(1)}%</td>` : '<td style="font-size:10px;color:#374151">-</td>') +
          (d5 != null ? `<td class="${d5>=0?'g':'r'}" style="font-size:11px">${d5>=0?'+':''}${d5.toFixed(1)}%</td>` : '<td style="font-size:10px;color:#374151">-</td>') +
          (d10 != null ? `<td class="${d10>=0?'g':'r'}" style="font-size:11px">${d10>=0?'+':''}${d10.toFixed(1)}%</td>` : '<td style="font-size:10px;color:#374151">-</td>') +
          (d20 != null ? `<td class="${d20>=0?'g':'r'}" style="font-size:11px">${d20>=0?'+':''}${d20.toFixed(1)}%</td>` : '<td style="font-size:10px;color:#374151">-</td>') +
          (now != null ? `<td class="${now>=0?'g':'r'}" style="font-size:11px">${now>=0?'+':''}${now.toFixed(1)}%</td>` : '<td style="font-size:10px;color:#374151">-</td>');
      }
    } else {
      fwdCells = "<td></td><td></td><td></td><td></td><td></td>";
    }
    const reason = l.reason || "-";
    const reviewed = _reviewedTradeIds.has(l.id);
    const reviewBtn = reviewed
      ? `<button class="btn btn-sm" style="border-color:#22c55e;color:#22c55e" onclick="reviewTrade('${l.date}',${l.id})">已复盘</button>`
      : `<button class="btn btn-sm" style="border-color:#3b82f6;color:#60a5fa" onclick="reviewTrade('${l.date}',${l.id})">复盘</button>`;
    return `<tr><td>${l.date}</td><td>${l.code}</td><td>${l.name}</td><td>${dir}</td><td>${fmtPrice(l.price)}</td><td>${l.shares}</td><td>${pnlCell}</td><td>${pnlPctCell}</td>${fwdCells}<td style="font-size:11px;color:#6b7280;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.reason||''}">${reason}</td><td>${reviewBtn}</td></tr>`;
  }).join("");

  // Render pager
  const pager = document.getElementById("historyPager");
  if (totalPages <= 1) {
    pager.style.display = "none";
  } else {
    pager.style.display = "flex";
    pager.innerHTML = `
      <button class="btn btn-sm" onclick="goHistoryPage(${_historyPage - 1})" ${_historyPage <= 1 ? 'disabled style="opacity:.3"' : ''}>上一页</button>
      <span>第 <b style="color:#e1e4e8">${_historyPage}</b> / ${totalPages} 页 (共 ${logs.length} 条)</span>
      <button class="btn btn-sm" onclick="goHistoryPage(${_historyPage + 1})" ${_historyPage >= totalPages ? 'disabled style="opacity:.3"' : ''}>下一页</button>
    `;
  }
}

function goHistoryPage(p) {
  _historyPage = p;
  renderHistory();
  document.getElementById("historyTable").scrollIntoView({ behavior: "smooth" });
}

function goToReviewedTrade() {
  const tradeId = _reviewTargetTrade ? _reviewTargetTrade.id : _lastReviewedTradeId;
  if (!tradeId) { toast("没有正在复盘的目标", "err"); return; }
  const logs = state.logs || [];
  const reversed = [...logs].reverse();
  const idx = reversed.findIndex(l => l.id === tradeId);
  if (idx < 0) { toast("找不到该交易", "err"); return; }
  // 切换到对应页
  _historyPage = Math.floor(idx / _historyPageSize) + 1;
  // 切换 tab
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelector('[data-tab="tab-history"]').classList.add("active");
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.getElementById("tab-history").classList.add("active");
  renderHistory();
  document.getElementById("historyTable").scrollIntoView({ behavior: "smooth" });
}

function renderSellSelect() {
  const sel = document.getElementById("sellCode");
  const h = state.holdings || [];
  sel.innerHTML = '<option value="">-- 选择 --</option>' +
    h.map(r => `<option value="${r.code}">${r.code} ${r.name} (${r.shares}股)</option>`).join("");
}

// ============ Strategy Comparison ============
function renderCompare() {
  const s = state.stats;
  const summary = document.getElementById("compareSummary");
  summary.innerHTML = `
    <span>策略日期 <b style="color:#e1e4e8">${state.strategyDate || "-"}</b></span>
    <span>持仓: 策略<b style="color:#60a5fa">${s.strategyHoldCount||0}</b>只 / 你跟<b style="color:#22c55e">${s.followedHolds||0}</b>只</span>
    <span>买入信号: <b style="color:#ef4444">${s.strategyBuyCount||0}</b>只 / 你跟<b style="color:#22c55e">${s.followedBuys||0}</b>只</span>
    <span>额外 <b style="color:#a78bfa">${s.extraCount||0}</b></span>
  `;

  // === 区1: 持仓对照 (策略 vs 你 合并一张表) ===
  const stratHolds = state.strategyHolds || [];
  const myHolds = state.holdings || [];

  // 合并去重
  const allCodes = new Set();
  stratHolds.forEach(h => allCodes.add(h.code));
  myHolds.forEach(h => allCodes.add(h.code));

  const merged = [];
  allCodes.forEach(code => {
    const s = stratHolds.find(h => h.code === code);
    const m = myHolds.find(h => h.code === code);
    merged.push({ code, strat: s || null, mine: m || null });
  });

  // 排序：双方都有 > 仅策略 > 仅你
  merged.sort((a, b) => {
    const aBoth = a.strat && a.mine ? 1 : 0;
    const bBoth = b.strat && b.mine ? 1 : 0;
    if (aBoth !== bBoth) return bBoth - aBoth;
    return (a.strat?.pnlPct || 0) - (b.strat?.pnlPct || 0) > 0 ? -1 : 1;
  });

  const holdsBody = document.querySelector("#compareHoldsTable tbody");
  const holdsEmpty = document.getElementById("emptyHolds");
  if (!merged.length) {
    holdsBody.innerHTML = "";
    holdsEmpty.style.display = "block";
  } else {
    holdsEmpty.style.display = "none";
    holdsBody.innerHTML = merged.map(row => {
      const s = row.strat;
      const m = row.mine;

      // 策略列
      const sHtml = s
        ? `<span style="color:#22c55e;font-weight:600">持有</span>`
        : `<span style="color:#374151">-</span>`;
      const sBuyDate = s ? (s.buyDate||"-") : "-";
      const sPrice = s ? (s.strategyPrice||s.buyPrice||0).toFixed(2) : "-";
      const sPnlCls = (s?.pnlPct||0) >= 0 ? "g" : "r";
      const sSign = (s?.pnlPct||0) >= 0 ? "+" : "";
      const sPnl = s ? `${sSign}${(s.pnlPct||0).toFixed(1)}%` : "-";

      // 你的列
      const mHtml = m
        ? `<span style="color:#a78bfa;font-weight:600">持有</span>`
        : `<span style="color:#374151">-</span>`;
      const mBuy = m ? (m.buy_price||0).toFixed(2) : "-";
      const mPrice = m ? (m.currentPrice||0).toFixed(2) : "-";
      const mPnlCls = (m?.pnlPct||0) >= 0 ? "g" : "r";
      const mSign = (m?.pnlPct||0) >= 0 ? "+" : "";
      const mPnl = m ? `${mSign}${(m.pnlPct||0).toFixed(1)}%` : "-";
      const mDays = m ? `${m.holdDays}天` : "-";

      // 行颜色：双方都有=绿边，仅策略=蓝边，仅你=紫边
      let border;
      if (s && m) border = 'border-left:3px solid #22c55e';
      else if (s) border = 'border-left:3px solid #60a5fa';
      else border = 'border-left:3px solid #a78bfa';

      return `<tr style="${border}">
        <td>${row.code}</td>
        <td>${s?.name || m?.name || row.code}</td>
        <td>${sHtml}</td>
        <td>${sBuyDate}</td>
        <td>${sPrice}</td>
        <td class="${sPnlCls}">${sPnl}</td>
        <td>${mHtml}</td>
        <td>${mBuy}</td>
        <td>${mPrice}</td>
        <td class="${mPnlCls}">${mPnl}</td>
        <td>${mDays}</td>
      </tr>`;
    }).join("");
  }

  // === 区2: 策略买入信号 ===
  const buys = state.strategyBuys || [];
  const buysBody = document.querySelector("#compareBuyTable tbody");
  const buysEmpty = document.getElementById("emptyBuys");
  if (!buys.length) {
    buysBody.innerHTML = "";
    buysEmpty.style.display = "block";
  } else {
    buysEmpty.style.display = "none";
    buysBody.innerHTML = buys.map(b => {
      const followed = b.followed
        ? '<span style="color:#22c55e;font-weight:600">已跟</span>'
        : '<span style="color:#f59e0b;font-weight:600">漏了</span>';
      const border = b.followed ? 'border-left:3px solid #22c55e' : 'border-left:3px solid #f59e0b';
      const shortR = b.reason ? (b.reason.length>30 ? b.reason.slice(0,28)+'..' : b.reason) : '-';
      return `<tr style="${border}">
        <td style="color:#6b7280">#${b.rank||"-"}</td>
        <td>${b.code}</td><td>${b.name}</td>
        <td>${(b.score||0).toFixed(0)}</td>
        <td>${(b.close||0).toFixed(2)}</td>
        <td>${b.chg5d!=null ? (b.chg5d>=0?"+":"")+b.chg5d.toFixed(1)+"%" : "-"}</td>
        <td>${b.volRatio!=null ? b.volRatio.toFixed(1)+"x" : "-"}</td>
        <td>${b.upVolRatio!=null ? b.upVolRatio.toFixed(2) : "-"}</td>
        <td style="font-size:11px;color:#6b7280" title="${b.reason||''}">${shortR}</td>
        <td>${followed}</td>
      </tr>`;
    }).join("");
  }
}

// ============ Helpers ============
async function api(action, body) {
  const r = await fetch(`/api/trading/${action}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  if (data.error) toast(data.error, "err");
  else toast(data.ok || "操作成功", "ok");
}

function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove("show"), 2000);
}

function fmtMoney(v) {
  if (v === undefined || v === null) return "-";
  const n = Math.abs(v);
  if (n >= 1e8) return (v / 1e8).toFixed(2) + "亿";
  if (n >= 1e4) return (v / 1e4).toFixed(1) + "万";
  return v.toFixed(0);
}
// ============ Journal ============
let journalEntries = [];
let currentReview = { verdict: "", note: "" };

const REVIEW_STYLE = {
  "对": "background:#14532d;color:#86efac;border:1px solid #22c55e;",
  "错": "background:#7f1d1d;color:#fca5a5;border:1px solid #ef4444;",
  "半对": "background:#713f12;color:#fde68a;border:1px solid #f59e0b;",
  "待复盘": "background:#1f2937;color:#cbd5e1;border:1px solid #4b5563;",
};

function setReview(verdict) {
  currentReview.verdict = verdict;
  document.getElementById("reviewVerdict").textContent = verdict ? `当前: ${verdict}` : "";
  ["reviewBtnRight", "reviewBtnWrong", "reviewBtnHalf"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.boxShadow = "none";
  });
  const activeId = verdict === "对" ? "reviewBtnRight" : verdict === "错" ? "reviewBtnWrong" : verdict === "半对" ? "reviewBtnHalf" : null;
  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) el.style.boxShadow = "0 0 0 1px currentColor";
  }
}

function clearReview() {
  currentReview = { verdict: "", note: "" };
  document.getElementById("reviewVerdict").textContent = "";
  document.getElementById("journalReviewNote").value = "";
  ["reviewBtnRight", "reviewBtnWrong", "reviewBtnHalf"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.boxShadow = "none";
  });
}

function renderDayTrades() {
  const date = document.getElementById("journalDate").value;
  const list = document.getElementById("dayTradeList");
  if (!date) {
    list.innerHTML = '<div class="empty" style="padding:16px;">先选日期</div>';
    return;
  }
  const trades = (state.logs || []).filter(l => l.date === date);
  if (!trades.length) {
    list.innerHTML = '<div class="empty" style="padding:16px;">这一天没有找到流水</div>';
    return;
  }
  const buys = trades.filter(t => t.action === "buy").length;
  const sells = trades.filter(t => t.action === "sell").length;
  const realized = trades.filter(t => t.action === "sell").reduce((s, t) => s + (t.pnl || 0), 0);

  // 如果只有一笔交易且没有指定目标，自动选中它
  if (!_reviewTargetTrade && trades.length === 1) {
    _reviewTargetTrade = trades[0];
  }

  // 同时拉取大盘环境
  fetch(`/api/trading/market_context?date=${date}`)
    .then(r => r.json())
    .then(market => {
      let mktHtml = "";
      if (market && market.sentiment) {
        const sColors = { GREEN: "#22c55e", YELLOW: "#f59e0b", RED: "#ef4444" };
        const sBg = { GREEN: "#14532d44", YELLOW: "#713f1244", RED: "#7f1d1d44" };
        const color = sColors[market.sentiment] || "#6b7280";
        const bg = sBg[market.sentiment] || "#1f2937";
        mktHtml = `
          <div style="margin-bottom:8px; padding:8px 12px; background:${bg}; border:1px solid ${color}; border-radius:6px; font-size:11px;">
            <b style="color:${color};">${market.description || ""}</b>
          </div>`;
      }
      list.innerHTML = `
        ${mktHtml}
        <div style="margin-bottom:8px; font-size:12px; color:#9ca3af;">
          共 ${trades.length} 笔，买入 ${buys}，卖出 ${sells}，当日已实现 ${realized >= 0 ? "+" : ""}${fmtMoney(realized)}
        </div>
        <div style="display:flex; flex-direction:column; gap:8px;">
          ${trades.map(t => {
            const cls = t.action === "buy" ? "r" : "g";
            const sign = t.action === "buy" ? "-" : "+";
            const reason = t.reason ? `<div style="font-size:11px;color:#6b7280;margin-top:2px;">${t.reason}</div>` : "";
            const isTarget = _reviewTargetTrade && t.id === _reviewTargetTrade.id;
            const border = isTarget ? 'border:2px solid #3b82f6;box-shadow:0 0 12px rgba(59,130,246,0.35);' : 'border:1px solid #2a2d3e;';
            const bg = isTarget ? 'background:#1a2035;' : 'background:#11151c;';
            return `
              <div style="${bg}${border}border-radius:8px;padding:10px 12px;">
                <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
                  <div>
                    <span class="${cls}" style="font-weight:700;">${t.action === "buy" ? "买入" : "卖出"}</span>
                    <span style="margin-left:8px;">${t.code} ${t.name}</span>
                    ${isTarget ? '<span style="margin-left:6px;font-size:10px;color:#3b82f6;">◀ 正在复盘</span>' : ''}
                  </div>
                  <div style="text-align:right;font-size:12px;">
                    <div>${fmtPrice(t.price)} x ${t.shares}</div>
                    <div style="color:${t.action === 'buy' ? '#fca5a5' : '#86efac'}">${sign}${fmtMoney(Math.abs(t.amount || 0))}</div>
                  </div>
                </div>
                ${reason}
              </div>
            `;
          }).join("")}
        </div>
      `;
    });
}

function toggleEmotion(btn) {
  btn.classList.toggle("on");
}

function getSelectedEmotions() {
  const btns = document.querySelectorAll("#journalEmotion .emo-btn.on");
  return Array.from(btns).map(b => b.dataset.v).join(",");
}

function setSelectedEmotions(val) {
  const list = (val || "").split(",").map(s => s.trim()).filter(Boolean);
  document.querySelectorAll("#journalEmotion .emo-btn").forEach(b => {
    if (list.includes(b.dataset.v)) b.classList.add("on");
    else b.classList.remove("on");
  });
}

function toggleMistakeBtn(btn) {
  btn.classList.toggle("on");
}

function getSelectedMistakes() {
  const btns = document.querySelectorAll("#journalMistakeType .emo-btn.on");
  return Array.from(btns).map(b => b.dataset.v).join(",");
}

function setSelectedMistakes(val) {
  const list = (val || "").split(",").map(s => s.trim()).filter(Boolean);
  document.querySelectorAll("#journalMistakeType .emo-btn").forEach(b => {
    if (list.includes(b.dataset.v)) b.classList.add("on");
    else b.classList.remove("on");
  });
}

function clearJournalForm() {
  document.querySelectorAll("#journalEmotion .emo-btn").forEach(b => b.classList.remove("on"));
  document.querySelectorAll("#journalMistakeType .emo-btn").forEach(b => b.classList.remove("on"));
  document.getElementById("journalTradeType").value = "";
  document.getElementById("journalPlanFollowed").value = "";
  document.getElementById("journalRationale").value = "";
  document.getElementById("journalExpectation").value = "";
  document.getElementById("journalOutcome").value = "";
  document.getElementById("journalScore").value = "";
  document.getElementById("journalLessons").value = "";
  document.getElementById("journalPlan").value = "";
  clearReview();
}

async function saveJournal() {
  const date = document.getElementById("journalDate").value;
  if (!date) { toast("请选择日期", "err"); return; }

  // 如果有正在复盘的目标交易，用 trade_id 保存
  const tradeId = _reviewTargetTrade ? _reviewTargetTrade.id : null;

  const tradeItems = (state.logs || []).filter(l => l.date === date).map(l => ({
    date: l.date,
    code: l.code,
    name: l.name,
    action: l.action,
    price: l.price,
    shares: l.shares,
    amount: l.amount,
    reason: l.reason || "",
    pnl: l.pnl ?? null,
    pnlPct: l.pnlPct ?? null,
  }));
  const payload = {
    date,
    trade_id: tradeId,
    emotion: getSelectedEmotions(),
    trade_type: document.getElementById("journalTradeType").value,
    plan_followed: document.getElementById("journalPlanFollowed").value,
    trade_rationale: document.getElementById("journalRationale").value,
    expectation: document.getElementById("journalExpectation").value,
    outcome: document.getElementById("journalOutcome").value,
    lessons: document.getElementById("journalLessons").value,
    tomorrow_plan: document.getElementById("journalPlan").value,
    mistake_type: getSelectedMistakes(),
    score: document.getElementById("journalScore").value ? parseInt(document.getElementById("journalScore").value, 10) : null,
    review: {
      verdict: currentReview.verdict,
      note: document.getElementById("journalReviewNote").value,
    },
    trades: tradeItems,
  };
  const r = await fetch("/api/trading/journal", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const data = await r.json();
  if (data.error) { toast(data.error, "err"); return; }
  document.getElementById("journalMsg").textContent = "已保存 ✓";
  setTimeout(() => document.getElementById("journalMsg").textContent = "", 2000);
  // 记录最后复盘的目标
  if (tradeId) _lastReviewedTradeId = tradeId;
  // 立即更新按钮状态
  if (tradeId && currentReview.verdict) {
    _reviewedTradeIds.add(tradeId);
    renderHistory();
  }
  await loadJournalList();
  await checkReviewReminder();
}

function renderJournalStats(entries) {
  const reviewed = entries.filter(e => (e.review || {}).verdict);
  const judged = reviewed.length;
  const correct = reviewed.filter(e => (e.review || {}).verdict === "对").length;
  const wrong = reviewed.filter(e => (e.review || {}).verdict === "错").length;
  const half = reviewed.filter(e => (e.review || {}).verdict === "半对").length;
  const scoreList = entries.map(e => parseFloat(e.score)).filter(v => !Number.isNaN(v));
  const avgScore = scoreList.length ? (scoreList.reduce((s, v) => s + v, 0) / scoreList.length) : 0;
  const planFollowed = entries.filter(e => e.plan_followed === "是").length;
  const totalTrades = entries.reduce((s, e) => s + ((e.trades && e.trades.length) ? e.trades.length : (e.trade_count || 0)), 0);
  const accuracy = judged ? (correct / judged * 100) : 0;
  const planRate = entries.length ? (planFollowed / entries.length * 100) : 0;
  document.getElementById("journalStats").innerHTML = `
    <div class="review-stat"><div class="k">复盘天数</div><div class="v">${judged}/${entries.length || 0}</div><div class="k">当天流水 ${totalTrades} 笔</div></div>
    <div class="review-stat"><div class="k">判对率</div><div class="v">${accuracy.toFixed(0)}%</div><div class="k">对 ${correct} / 错 ${wrong} / 半对 ${half}</div></div>
    <div class="review-stat"><div class="k">平均评分</div><div class="v">${avgScore ? avgScore.toFixed(1) : "-"}</div><div class="k">按计划率 ${planRate.toFixed(0)}%</div></div>
  `;

  const mistakes = {};
  entries.forEach(e => {
    const k = e.mistake_type || "未归类";
    if (!k || k === "无明显错误") return;
    mistakes[k] = (mistakes[k] || 0) + 1;
  });
  const topMistakes = Object.entries(mistakes).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const latest = entries[0];
  const latestVerdict = latest && latest.review ? (latest.review.verdict || "待复盘") : "待复盘";
  document.getElementById("mistakeStats").innerHTML = `
    <div style="margin-bottom:6px;">最近一笔: <span class="tag" style="${REVIEW_STYLE[latestVerdict] || REVIEW_STYLE['待复盘']}">${latest?.date || "-"}</span> ${latestVerdict}</div>
    <div style="margin-bottom:6px;">按计划率: ${planRate.toFixed(1)}%</div>
    <div>常见错误: ${
      topMistakes.length
        ? topMistakes.map(([k, v]) => `<span class="trade-pill">${k} ${v}</span>`).join("")
        : '<span style="color:#6b7280;">暂无错误分类</span>'
    }</div>
  `;
}

async function loadJournalList() {
  const r = await fetch("/api/trading/journal");
  const entries = await r.json();
  journalEntries = entries;
  // 更新已复盘集合
  _reviewedTradeIds = new Set();
  entries.forEach(e => {
    if (e.trade_id && (e.review || {}).verdict) {
      _reviewedTradeIds.add(e.trade_id);
    }
  });
  const container = document.getElementById("journalList");
  document.getElementById("journalCount").textContent = `(${entries.length} 天)`;
  renderJournalStats(entries);

  if (!entries.length) {
    container.innerHTML = '<div class="empty">暂无复盘记录</div>';
    return;
  }

  container.innerHTML = entries.map(e => {
    const rv = e.review || {};
    const verdict = rv.verdict || "";
    const badge = verdict
      ? `<span class="tag" style="${REVIEW_STYLE[verdict] || REVIEW_STYLE['待复盘']}">${verdict}</span>`
      : '<span class="tag" style="' + REVIEW_STYLE['待复盘'] + '">待复盘</span>';
    // 查找对应的交易
    let tradeLabel = "";
    if (e.trade_id) {
      const trade = (state.logs || []).find(l => l.id === e.trade_id);
      if (trade) {
        const dir = trade.action === "buy" ? '<span style="color:#ef4444">买入</span>' : '<span style="color:#22c55e">卖出</span>';
        tradeLabel = `<span style="font-size:12px;color:#cbd5e1;">${trade.name}(${trade.code}) ${dir}</span>`;
      }
    }
    const info = [
      e.emotion ? `${e.emotion}` : "",
      e.trade_type ? `${e.trade_type}` : "",
      e.plan_followed ? `按计划:${e.plan_followed}` : "",
      e.mistake_type ? `${e.mistake_type}` : "",
    ].filter(Boolean).join(" · ");
    const summary = (e.trade_rationale || e.expectation || e.outcome || "").slice(0, 110);
    return `
      <div style="background:#161822; border:1px solid #2a2d3e; border-radius:8px; padding:14px; margin-bottom:10px; cursor:pointer;"
           onclick="${e.trade_id ? `reviewTrade('${e.date}',${e.trade_id})` : `loadJournalEntry('${e.date}')`}">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:8px;">
          <div>
            <span style="font-weight:600; color:#60a5fa;">${e.date}</span>
            ${tradeLabel ? `<span style="margin-left:8px;">${tradeLabel}</span>` : ''}
          </div>
          <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
            ${badge}
            <span style="font-size:11px; color:#6b7280;">${e.updated_at || ""}</span>
          </div>
        </div>
        ${info ? `<div style="font-size:11px;color:#9ca3af;margin-bottom:6px;">${info}</div>` : ""}
        <div style="font-size:12px; color:#cbd5e1; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">
          ${summary || "无摘要"}
        </div>
        <button class="btn btn-sm" style="margin-top:8px;" onclick="event.stopPropagation(); deleteJournal(${e.id})">删除</button>
      </div>
    `;
  }).join("");
}

function loadJournalEntry(date, entryObj) {
  if (entryObj) {
    // 直接使用传入的 entry object
    fillJournalForm(entryObj);
    return;
  }
  document.getElementById("journalDate").value = date;
  fetch("/api/trading/journal?date=" + encodeURIComponent(date))
    .then(r => r.json())
    .then(entries => {
      if (!entries.length) return;
      fillJournalForm(entries[0]);
    });
}

function fillJournalForm(e) {
      setSelectedEmotions(e.emotion || "");
      document.getElementById("journalTradeType").value = e.trade_type || "";
      document.getElementById("journalPlanFollowed").value = e.plan_followed || "";
      document.getElementById("journalRationale").value = e.trade_rationale || e.market_view || "";
      document.getElementById("journalExpectation").value = e.expectation || e.sector_view || "";
      document.getElementById("journalOutcome").value = e.outcome || "";
      document.getElementById("journalLessons").value = e.lessons || "";
      document.getElementById("journalPlan").value = e.tomorrow_plan || "";
      setSelectedMistakes(e.mistake_type || "");
      document.getElementById("journalScore").value = e.score ? String(e.score) : "";
      currentReview = e.review || { verdict: "", note: "" };
      document.getElementById("reviewVerdict").textContent = currentReview.verdict ? `当前: ${currentReview.verdict}` : "";
      document.getElementById("journalReviewNote").value = currentReview.note || "";
      ["reviewBtnRight", "reviewBtnWrong", "reviewBtnHalf"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.boxShadow = "none";
      });
      const activeId = currentReview.verdict === "对" ? "reviewBtnRight" : currentReview.verdict === "错" ? "reviewBtnWrong" : currentReview.verdict === "半对" ? "reviewBtnHalf" : null;
      if (activeId) {
        const el = document.getElementById(activeId);
        if (el) el.style.boxShadow = "0 0 0 1px currentColor";
      }
      document.getElementById("journalDate").value = e.date || "";
      renderDayTrades();
}

async function deleteJournal(id) {
  if (!confirm("删除这条复盘？")) return;
  await fetch(`/api/trading/journal/${id}`, { method: "DELETE" });
  loadJournalList();
  checkReviewReminder();
}

async function reviewYesterday() {
  const r = await fetch("/api/trading/journal");
  const all = await r.json();
  const today = new Date();
  const unreviewed = all.filter(e => {
    if ((e.review || {}).verdict) return false;
    const d = new Date(e.date);
    return Math.floor((today - d) / 86400000) >= 1;
  }).sort((a, b) => a.date.localeCompare(b.date));
  if (!unreviewed.length) {
    toast("没有待复盘的记录", "err");
    return;
  }
  loadJournalEntry(unreviewed[0].date);
}

async function checkReviewReminder() {
  const reminder = document.getElementById("reviewReminder");
  const r = await fetch("/api/trading/journal");
  const all = await r.json();
  const today = new Date();
  const unreviewed = all.filter(e => {
    if ((e.review || {}).verdict) return false;
    const d = new Date(e.date);
    return Math.floor((today - d) / 86400000) >= 1;
  });

  if (unreviewed.length) {
    unreviewed.sort((a, b) => a.date.localeCompare(b.date));
    reminder.style.display = "flex";
    document.getElementById("reviewReminderDate").textContent = unreviewed[0].date;
    document.getElementById("reviewReminderBtn").textContent =
      unreviewed.length === 1 ? "去复盘" : `去复盘（还有${unreviewed.length}篇）`;
  } else {
    reminder.style.display = "none";
  }
}

function fmtPrice(v) {
  if (v === undefined || v === null) return "-";
  return v.toFixed(2);
}

// 当前复盘目标交易（从历史记录点进来的）
let _reviewTargetTrade = null;
let _lastReviewedTradeId = null;
// 已复盘的 trade_id 集合
let _reviewedTradeIds = new Set();

function reviewTrade(date, id) {
  // 找到这笔交易
  const trade = (state.logs || []).find(l => l.id === id);
  if (!trade) { alert('找不到该交易'); return; }
  _reviewTargetTrade = trade;

  // 切换到复盘 tab
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelector('[data-tab="tab-journal"]').classList.add("active");
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.getElementById("tab-journal").classList.add("active");
  document.getElementById("journalDate").value = date;

  // 加载这笔交易的复盘（如果之前保存过）
  fetch(`/api/trading/journal?trade_id=${id}`)
    .then(r => r.json())
    .then(entries => {
      if (entries && entries.length > 0) {
        loadJournalEntry(entries[0].date, entries[0]);
      } else {
        clearJournalForm();
        document.getElementById("journalDate").value = date;
      }
      renderDayTrades();
    });

  // 滚动到复盘区域
  document.getElementById("tab-journal").scrollIntoView({ behavior: "smooth" });
}
