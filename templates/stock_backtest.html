<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>个股回测 - A股数据面板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>if(typeof echarts==='undefined'){document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"><\/script>');}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #101318;
    color: #e5e7eb;
    min-height: 100vh;
  }
  .nav {
    height: 48px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    background: #161a22;
    border-bottom: 1px solid #29303b;
  }
  .brand { font-size: 14px; font-weight: 600; margin-right: 24px; color: #f3f4f6; }
  .nav a {
    height: 100%;
    padding: 0 16px;
    display: flex;
    align-items: center;
    color: #9ca3af;
    text-decoration: none;
    font-size: 13px;
    border-bottom: 2px solid transparent;
  }
  .nav a:hover, .nav a.on { color: #f9fafb; border-bottom-color: #38bdf8; }
  .page { max-width: 1500px; margin: 0 auto; padding: 18px 22px 28px; }
  .layout { display: grid; grid-template-columns: 360px 1fr; gap: 16px; align-items: start; }
  .panel {
    background: #171c24;
    border: 1px solid #2b3340;
    border-radius: 8px;
    overflow: hidden;
  }
  .panel-head {
    padding: 13px 15px;
    border-bottom: 1px solid #2b3340;
    color: #f3f4f6;
    font-size: 14px;
    font-weight: 600;
  }
  .form { padding: 14px; display: grid; gap: 12px; }
  label { display: grid; gap: 7px; color: #aab2bf; font-size: 12px; }
  input, select {
    height: 38px;
    border: 1px solid #343d4c;
    border-radius: 6px;
    background: #11151c;
    color: #e5e7eb;
    padding: 0 10px;
    outline: none;
    font-size: 13px;
  }
  input:focus, select:focus { border-color: #38bdf8; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn {
    height: 40px;
    border: 0;
    border-radius: 6px;
    background: #0ea5e9;
    color: #06121a;
    font-weight: 700;
    cursor: pointer;
  }
  .btn:hover { background: #38bdf8; }
  .btn:disabled { opacity: .55; cursor: default; }
  .stock-list {
    max-height: 310px;
    overflow: auto;
    border-top: 1px solid #2b3340;
  }
  .stock-item {
    padding: 10px 14px;
    border-bottom: 1px solid #242b36;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
  }
  .stock-item:hover, .stock-item.on { background: #1f2937; }
  .code { color: #cbd5e1; font-family: Consolas, monospace; }
  .muted { color: #8b95a5; }
  .strategy-note {
    color: #8b95a5;
    font-size: 12px;
    line-height: 1.55;
    min-height: 38px;
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(6, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .metric {
    background: #171c24;
    border: 1px solid #2b3340;
    border-radius: 8px;
    padding: 12px;
  }
  .metric span { display: block; color: #8b95a5; font-size: 12px; margin-bottom: 7px; }
  .metric strong { font-size: 20px; color: #f9fafb; }
  .red { color: #f87171 !important; }
  .green { color: #4ade80 !important; }
  .charts {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  #k-chart { height: 520px; }
  #equity-chart { height: 300px; }
  .table-wrap { max-height: 360px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    padding: 10px 12px;
    border-bottom: 1px solid #242b36;
    text-align: left;
    font-size: 13px;
  }
  th {
    position: sticky;
    top: 0;
    background: #1d2430;
    color: #aab2bf;
    font-weight: 600;
  }
  .empty {
    min-height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8b95a5;
  }
  .toast {
    position: fixed;
    right: 20px;
    top: 20px;
    display: none;
    max-width: 360px;
    padding: 12px 14px;
    border-radius: 6px;
    color: #fecaca;
    background: #7f1d1d;
    border: 1px solid #991b1b;
    font-size: 13px;
  }
  @media (max-width: 1060px) {
    .layout { grid-template-columns: 1fr; }
    .summary { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
  }
  @media (max-width: 680px) {
    .nav { padding: 0 14px; overflow-x: auto; }
    .page { padding: 14px; }
    .row, .summary { grid-template-columns: 1fr; }
    #k-chart { height: 420px; }
  }
</style>
</head>
<body>
<nav class="nav">
  <span class="brand">A股数据面板</span>
  <a href="/">首页</a>
  <a href="/stocks">个股</a>
  <a href="/concepts">概念</a>
  <a href="/stock-backtest" class="on">个股回测</a>
  <a href="/backtest-battle">回测大比拼</a>
  <a href="/macd-market-backtest">MACD全市场</a>
</nav>

<div class="page">
  <div class="layout">
    <aside class="panel">
      <div class="panel-head">回测设置</div>
      <div class="form">
        <label>
          股票代码或名称
          <input id="stock-q" placeholder="例如 sh.600000 / 浦发" onkeydown="if(event.key==='Enter')searchStocks()">
        </label>
        <button class="btn" onclick="searchStocks()">搜索股票</button>
        <label>
          策略
          <select id="strategy" onchange="showStrategyNote()"></select>
        </label>
        <div class="strategy-note" id="strategy-note"></div>
        <div class="row">
          <label>
            初始资金
            <input id="cash" type="number" value="100000" min="10000" step="10000">
          </label>
          <label>
            回测天数
            <input id="days" type="number" value="1000" min="60" max="2000" step="50">
          </label>
        </div>
        <button class="btn" id="run-btn" onclick="runBacktest()">运行回测</button>
      </div>
      <div class="stock-list" id="stock-list"></div>
    </aside>

    <main>
      <div class="summary" id="summary"></div>
      <section class="panel">
        <div class="panel-head" id="chart-title">个股回测</div>
        <div id="empty" class="empty">选择股票和策略后运行回测</div>
        <div class="charts" id="charts" style="display:none;">
          <div id="k-chart"></div>
          <div id="equity-chart"></div>
        </div>
      </section>
      <section class="panel" style="margin-top:16px;">
        <div class="panel-head">交易详情</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>买入日期</th>
                <th>买入价</th>
                <th>卖出日期</th>
                <th>卖出价</th>
                <th>股数</th>
                <th>收益</th>
                <th>收益率</th>
                <th>原因</th>
              </tr>
            </thead>
            <tbody id="trade-body">
              <tr><td colspan="8" class="muted">暂无交易</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let strategies = [];
let selectedStock = null;
let kChart = null;
let equityChart = null;

function toast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.style.display = "none", 3000);
}

function fmtMoney(v) {
  if (v === null || v === undefined) return "--";
  return Number(v).toLocaleString(undefined, { maximumFractionDigits: 2 });
}

function pctClass(v) {
  return Number(v) >= 0 ? "red" : "green";
}

async function init() {
  strategies = await fetch("/api/backtest/strategies").then(r => r.json());
  $("strategy").innerHTML = strategies.map(s => `<option value="${s.id}">${s.name}</option>`).join("");
  showStrategyNote();
  $("stock-q").value = "sh.600000";
  await searchStocks();
}

function showStrategyNote() {
  const item = strategies.find(s => s.id === $("strategy").value);
  $("strategy-note").textContent = item ? item.description : "";
}

async function searchStocks() {
  const q = $("stock-q").value.trim();
  const result = await fetch(`/api/stocks?page=1&per_page=20&q=${encodeURIComponent(q)}`).then(r => r.json());
  const items = result.items || [];
  if (!items.length) {
    $("stock-list").innerHTML = '<div class="stock-item muted">没有匹配股票</div>';
    selectedStock = null;
    return;
  }
  if (!selectedStock) selectedStock = items[0];
  $("stock-list").innerHTML = items.map(s => `
    <div class="stock-item ${selectedStock && selectedStock.code === s.code ? "on" : ""}" onclick='selectStock(${JSON.stringify(s)})'>
      <span><span class="code">${s.code}</span> ${s.name}</span>
      <span class="muted">${(s.market || "").toUpperCase()}</span>
    </div>
  `).join("");
}

function selectStock(stock) {
  selectedStock = stock;
  $("stock-q").value = stock.code;
  document.querySelectorAll(".stock-item").forEach(el => el.classList.remove("on"));
  event.currentTarget.classList.add("on");
}

async function runBacktest() {
  if (!selectedStock) {
    toast("请先选择股票");
    return;
  }
  const btn = $("run-btn");
  btn.disabled = true;
  btn.textContent = "回测中...";
  try {
    const res = await fetch("/api/backtest/stock", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        code: selectedStock.code,
        strategy: $("strategy").value,
        initial_cash: Number($("cash").value || 100000),
        days: Number($("days").value || 1000),
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "回测失败");
    renderResult(data);
  } catch (err) {
    toast(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "运行回测";
  }
}

function renderResult(data) {
  $("empty").style.display = "none";
  $("charts").style.display = "grid";
  $("chart-title").textContent = `${data.stock.name} (${data.stock.code}) - ${data.strategy.name}`;
  renderSummary(data.summary);
  renderKChart(data);
  renderEquityChart(data);
  renderTrades(data.trades);
}

function renderSummary(s) {
  const metrics = [
    ["总收益", `${s.total_return_pct}%`, pctClass(s.total_return_pct)],
    ["期末权益", fmtMoney(s.final_equity), ""],
    ["买入持有", `${s.buy_hold_return_pct}%`, pctClass(s.buy_hold_return_pct)],
    ["最大回撤", `${s.max_drawdown_pct}%`, "green"],
    ["交易次数", s.trade_count, ""],
    ["胜率", `${s.win_rate_pct}%`, ""],
  ];
  $("summary").innerHTML = metrics.map(m => `
    <div class="metric"><span>${m[0]}</span><strong class="${m[2]}">${m[1]}</strong></div>
  `).join("");
}

function renderKChart(data) {
  if (kChart) kChart.dispose();
  kChart = echarts.init($("k-chart"));
  const bars = data.bars;
  const dates = bars.map(b => b.trade_date);
  const ohlc = bars.map(b => [b.open, b.close, b.low, b.high]);
  const markerByDate = {};
  data.markers.forEach(m => markerByDate[m.date] = m);

  kChart.setOption({
    backgroundColor: "transparent",
    tooltip: { trigger: "axis", axisPointer: { type: "cross" } },
    grid: { left: 58, right: 28, top: 30, bottom: 70 },
    dataZoom: [
      { type: "inside", start: 0, end: 100 },
      { start: 0, end: 100, bottom: 18, textStyle: { color: "#9ca3af" } }
    ],
    xAxis: { type: "category", data: dates, axisLabel: { color: "#9ca3af" }, axisLine: { lineStyle: { color: "#374151" } } },
    yAxis: { scale: true, axisLabel: { color: "#9ca3af" }, splitLine: { lineStyle: { color: "#27313f" } } },
    series: [{
      name: "K线",
      type: "candlestick",
      data: ohlc,
      itemStyle: {
        color: "#ef4444",
        color0: "#22c55e",
        borderColor: "#ef4444",
        borderColor0: "#22c55e",
      },
      markPoint: {
        symbolSize: 54,
        data: data.markers.map(m => ({
          name: m.action === "buy" ? "买" : "卖",
          coord: [m.date, m.price],
          value: m.action === "buy" ? "买" : `${m.profit_pct}%`,
          itemStyle: { color: m.action === "buy" ? "#0ea5e9" : (m.profit_pct >= 0 ? "#ef4444" : "#22c55e") },
          label: { formatter: m.text, color: "#fff", fontSize: 10 },
        })),
      },
    }]
  });
}

function renderEquityChart(data) {
  if (equityChart) equityChart.dispose();
  equityChart = echarts.init($("equity-chart"));
  const curve = data.equity_curve;
  equityChart.setOption({
    backgroundColor: "transparent",
    tooltip: { trigger: "axis" },
    grid: { left: 58, right: 28, top: 28, bottom: 42 },
    xAxis: { type: "category", data: curve.map(p => p.date), axisLabel: { color: "#9ca3af" }, axisLine: { lineStyle: { color: "#374151" } } },
    yAxis: { type: "value", scale: true, axisLabel: { color: "#9ca3af" }, splitLine: { lineStyle: { color: "#27313f" } } },
    series: [{
      name: "收益曲线",
      type: "line",
      smooth: true,
      showSymbol: false,
      data: curve.map(p => p.equity),
      areaStyle: { color: "rgba(14, 165, 233, .14)" },
      lineStyle: { color: "#38bdf8", width: 2 },
    }]
  });
}

function renderTrades(trades) {
  if (!trades.length) {
    $("trade-body").innerHTML = '<tr><td colspan="8" class="muted">该策略在当前区间没有完成交易</td></tr>';
    return;
  }
  $("trade-body").innerHTML = trades.map(t => `
    <tr>
      <td>${t.buy_date}</td>
      <td>${t.buy_price}</td>
      <td>${t.sell_date}</td>
      <td>${t.sell_price}</td>
      <td>${t.shares}</td>
      <td class="${pctClass(t.profit)}">${fmtMoney(t.profit)}</td>
      <td class="${pctClass(t.profit_pct)}">${t.profit_pct}%</td>
      <td>${t.buy_reason} / ${t.sell_reason}</td>
    </tr>
  `).join("");
}

window.addEventListener("resize", () => {
  if (kChart) kChart.resize();
  if (equityChart) equityChart.resize();
});

init();
</script>
</body>
</html>
