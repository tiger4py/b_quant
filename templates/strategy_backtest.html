<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>策略回测 - A股数据面板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>if(typeof echarts==='undefined'){document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"><\/script>');}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #101318; color: #e5e7eb; }
  .nav { height: 48px; padding: 0 28px; display: flex; align-items: center; background: #161a22; border-bottom: 1px solid #29303b; }
  .brand { font-size: 14px; font-weight: 600; margin-right: 24px; color: #f3f4f6; }
  .nav a { height: 100%; padding: 0 16px; display: flex; align-items: center; color: #9ca3af; text-decoration: none; font-size: 13px; border-bottom: 2px solid transparent; white-space: nowrap; }
  .nav a:hover, .nav a.on { color: #f9fafb; border-bottom-color: #38bdf8; }
  .page { max-width: 1520px; margin: 0 auto; padding: 18px 22px 28px; }
  .toolbar { display: grid; grid-template-columns: 320px 140px 1fr; gap: 12px; align-items: end; margin-bottom: 12px; }
  label { display: grid; gap: 7px; color: #aab2bf; font-size: 12px; }
  select {
    height: 38px; border: 1px solid #343d4c; border-radius: 6px; background: #11151c;
    color: #e5e7eb; padding: 0 10px; outline: none; font-size: 13px;
  }
  .btn { height: 38px; min-width: 120px; border: 0; border-radius: 6px; background: #0ea5e9; color: #06121a; font-weight: 700; cursor: pointer; }
  .btn:hover { background: #38bdf8; }
  .btn:disabled { opacity: .55; cursor: default; }
  .hint { color: #8b95a5; font-size: 13px; line-height: 1.55; align-self: center; }
  .summary { display: grid; grid-template-columns: repeat(5, minmax(150px, 1fr)); gap: 10px; margin: 12px 0 16px; }
  .metric { background: #171c24; border: 1px solid #2b3340; border-radius: 8px; padding: 12px; }
  .metric span { display: block; color: #8b95a5; font-size: 12px; margin-bottom: 7px; }
  .metric strong { font-size: 20px; color: #f9fafb; }
  .panel { background: #171c24; border: 1px solid #2b3340; border-radius: 8px; overflow: hidden; }
  .panel + .panel { margin-top: 16px; }
  .panel-head { padding: 13px 15px; border-bottom: 1px solid #2b3340; color: #f3f4f6; font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .panel-head span { color: #8b95a5; font-weight: 400; font-size: 12px; }
  .panel-head .head-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .toggle-btn { height: 28px; padding: 0 12px; border: 1px solid #343d4c; border-radius: 4px; background: #1d2430; color: #9ca3af; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .toggle-btn:hover { color: #e5e7eb; border-color: #38bdf8; }
  .panel-body.collapsed { display: none; }
  #overview-chart { height: 320px; }
  #equity-chart { height: 340px; display: none; }
  .table-wrap { max-height: 430px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 12px; border-bottom: 1px solid #242b36; text-align: left; font-size: 13px; white-space: nowrap; }
  th { position: sticky; top: 0; background: #1d2430; color: #aab2bf; font-weight: 600; z-index: 1; }
  .code { color: #cbd5e1; font-family: Consolas, monospace; }
  .stock-cell { display: inline-flex; align-items: center; gap: 8px; }
  .stock-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--stock-color); }
  tr.stock-mark td:first-child { box-shadow: inset 3px 0 0 var(--stock-color); }
  .strategy-link { color: #e5e7eb; cursor: pointer; text-decoration: underline; text-decoration-color: #38bdf8; text-underline-offset: 5px; }
  .strategy-link:hover { color: #38bdf8; }
  .action-badge { display: inline-flex; min-width: 42px; height: 22px; align-items: center; justify-content: center; border-radius: 999px; font-size: 12px; font-weight: 700; }
  .action-buy { color: #bae6fd; background: rgba(14, 165, 233, .18); border: 1px solid rgba(56, 189, 248, .42); }
  .action-sell { color: #fecaca; background: rgba(239, 68, 68, .16); border: 1px solid rgba(248, 113, 113, .42); }
  .muted { color: #8b95a5; }
  .red { color: #f87171 !important; }
  .green { color: #4ade80 !important; }
  .empty { min-height: 300px; display: flex; align-items: center; justify-content: center; color: #8b95a5; }
  .toast { position: fixed; right: 20px; top: 20px; display: none; max-width: 360px; padding: 12px 14px; border-radius: 6px; color: #fecaca; background: #7f1d1d; border: 1px solid #991b1b; font-size: 13px; }
  @media (max-width: 1180px) { .toolbar, .grid { grid-template-columns: 1fr; } .summary { grid-template-columns: repeat(2, minmax(150px, 1fr)); } }
  @media (max-width: 640px) { .nav { padding: 0 14px; overflow-x: auto; } .page { padding: 14px; } .summary { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<nav class="nav">
  <span class="brand">A股数据面板</span>
  <a href="/">首页</a>
  <a href="/stocks">个股</a>
  <a href="/concepts">概念</a>
  <a href="/strategy-backtest" class="on">策略回测</a>
  <a href="/trading">实盘记录</a>
</nav>

<div class="page">
  <div class="toolbar">
    <label>
      选择策略
      <select id="strategy" onchange="loadSelectedStrategy()"></select>
    </label>
    <button class="btn" id="refresh-btn" onclick="loadSelectedStrategy()">读取详情</button>
    <div class="hint" id="note">默认展示全部策略对比。点击榜单中的策略名，或从下拉框里选择策略，查看该策略的买卖和收益详情。</div>
  </div>

  <div class="summary" id="summary"></div>

  <section class="panel">
    <div class="panel-head">全部策略对比 <span id="overview-hint">等待加载</span></div>
    <div id="overview-chart"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>排名</th><th>策略</th><th>收益</th><th>回撤</th><th>胜率</th><th>交易次数</th><th>期末资产</th><th>评分</th></tr>
        </thead>
        <tbody id="overview-body"><tr><td colspan="8" class="muted">加载中...</td></tr></tbody>
      </table>
    </div>
  </section>

  <!-- 账户收益曲线 -->
  <section class="panel">
    <div class="panel-head">
      <div class="head-left">账户收益曲线 <span id="curve-hint">默认先看全部策略对比</span></div>
      <button class="toggle-btn" id="toggle-curve" onclick="togglePanel('curve-content', this)">展开</button>
    </div>
    <div id="curve-content" class="panel-body collapsed">
      <div id="detail-empty" class="empty">点击上方策略名，查看该策略的收益曲线和交易详情</div>
      <div id="equity-chart"></div>
    </div>
  </section>

  <!-- 买卖流水 -->
  <section class="panel">
    <div class="panel-head">
      <div class="head-left">买卖流水 <span id="trade-hint">按时间顺序</span></div>
      <button class="toggle-btn" id="toggle-trade" onclick="togglePanel('trade-content', this)">展开</button>
    </div>
    <div id="trade-content" class="panel-body collapsed">
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <input type="text" id="trade-filter-date" placeholder="日期，如 2026-06" oninput="applyTradeFilter()"
          style="background:#161822;border:1px solid #2a2d3e;border-radius:6px;color:#e1e4e8;padding:6px 10px;font-size:12px;width:160px;">
        <input type="text" id="trade-filter-stock" placeholder="股票代码或名称" oninput="applyTradeFilter()"
          style="background:#161822;border:1px solid #2a2d3e;border-radius:6px;color:#e1e4e8;padding:6px 10px;font-size:12px;width:160px;">
        <button onclick="clearTradeFilter()"
          style="background:#2a2d3e;color:#8b92a0;border:none;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;">清除</button>
        <span id="trade-filter-count" style="font-size:11px;color:#8b92a0;align-self:center;"></span>
      </div>

      <!-- 持仓快照（可选日期） -->
      <div id="open-positions" style="display:none;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;">
          <span style="color:#f3f4f6;font-size:13px;font-weight:600;">持仓快照</span>
          <input type="date" id="position-date" onchange="onPositionDateChange()"
            style="background:#161822;border:1px solid #2a2d3e;border-radius:4px;color:#e1e4e8;padding:4px 8px;font-size:12px;width:150px;">
          <span id="position-date-hint" style="color:#8b95a5;font-weight:400;font-size:12px;"></span>
        </div>
        <div class="table-wrap" style="max-height:260px;">
          <table>
            <thead>
              <tr><th>股票</th><th>买入日</th><th>买入价</th><th>股数</th><th>成本</th><th>权重%</th><th>持天</th><th>浮盈</th></tr>
            </thead>
            <tbody id="open-positions-body"><tr><td colspan="8" class="muted">--</td></tr></tbody>
          </table>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>步骤</th><th>日期</th><th>动作</th><th>股票</th><th>价格</th><th>股数</th><th>金额</th><th>仓位%</th><th>持天</th><th>收益</th><th>账户</th><th>原因</th></tr>
          </thead>
          <tbody id="trade-body"><tr><td colspan="12" class="muted">请选择策略后查看</td></tr></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 贡献股票 -->
  <section class="panel">
    <div class="panel-head">
      <div class="head-left">贡献股票 <span>按累计盈亏排序</span></div>
      <button class="toggle-btn" id="toggle-stock" onclick="togglePanel('stock-content', this)">展开</button>
    </div>
    <div id="stock-content" class="panel-body collapsed">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>排名</th><th>股票</th><th>盈亏</th><th>交易次数</th><th>胜率</th><th>平均持天</th></tr>
          </thead>
          <tbody id="stock-body"><tr><td colspan="6" class="muted">请选择策略后查看</td></tr></tbody>
        </table>
      </div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let overviewChart = null;
let equityChart = null;
let strategies = [];
let overviewRanking = [];
const STOCK_COLORS = ["#38bdf8","#f97316","#a78bfa","#22c55e","#f43f5e","#eab308","#14b8a6","#fb7185","#60a5fa","#c084fc","#84cc16","#f59e0b","#2dd4bf","#818cf8","#f472b6"];

function toast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.style.display = "none", 3500);
}

function fmtMoney(v) {
  return Number(v || 0).toLocaleString(undefined, { maximumFractionDigits: 2 });
}

function pctClass(v) {
  return Number(v) >= 0 ? "red" : "green";
}

function stockColor(code) {
  let hash = 0;
  for (const ch of code) hash = (hash * 31 + ch.charCodeAt(0)) >>> 0;
  return STOCK_COLORS[hash % STOCK_COLORS.length];
}

function stockLabel(code, name) {
  return `<span class="stock-cell" style="--stock-color:${stockColor(code)}"><span class="stock-dot"></span><span><span class="code">${code}</span> ${name}</span></span>`;
}

// ======== 面板折叠/展开 ========
function togglePanel(bodyId, btn) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  const collapsed = body.classList.toggle('collapsed');
  btn.textContent = collapsed ? '展开' : '收起';
  // 展开收益曲线面板时，触发 ECharts resize
  if (!collapsed && bodyId === 'curve-content' && equityChart) {
    setTimeout(() => equityChart.resize(), 100);
  }
}

// 展开所有详情面板（加载数据后自动展开）
function expandAllPanels() {
  ['curve-content', 'stock-content', 'trade-content'].forEach(id => {
    const body = document.getElementById(id);
    if (body && body.classList.contains('collapsed')) {
      body.classList.remove('collapsed');
    }
  });
  ['toggle-curve', 'toggle-stock', 'toggle-trade'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.textContent = '收起';
  });
  // 收益曲线 resize
  if (equityChart) {
    setTimeout(() => equityChart.resize(), 100);
  }
}

async function init() {
  try {
    strategies = await fetch("/api/backtest/strategies").then(r => r.json());
    $("strategy").innerHTML = ['<option value="">请选择策略</option>'].concat(
      strategies.map(item => `<option value="${item.id}">${item.name}</option>`)
    ).join("");
    await loadOverview();
  } catch (err) {
    toast("策略列表加载失败");
  }
}

async function loadOverview() {
  const res = await fetch("/api/backtest/market-overview");
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "全部策略对比加载失败");
  overviewRanking = data.ranking || [];
  renderOverview(data);

  // 自动选中收益最高的策略
  if (overviewRanking.length) {
    const best = overviewRanking[0];
    $("strategy").value = best.strategy_id;
    await loadSelectedStrategy();
  }
}

function renderOverview(data) {
  const ranking = data.ranking || [];
  const missing = data.missing || [];
  $("overview-hint").textContent = `${ranking.length} 个策略已生成，${missing.length} 个缺失缓存`;
  if (!ranking.length) {
    $("overview-body").innerHTML = '<tr><td colspan="8" class="muted">暂无策略缓存结果</td></tr>';
    $("summary").innerHTML = "";
    renderOverviewChart([]);
    return;
  }

  const best = ranking[0];
  $("summary").innerHTML = `
    <div class="metric"><span>冠军策略</span><strong>${best.strategy_name}</strong></div>
    <div class="metric"><span>最高收益</span><strong class="${pctClass(best.return_pct)}">${best.return_pct}%</strong></div>
    <div class="metric"><span>最优评分</span><strong>${best.score}</strong></div>
    <div class="metric"><span>期末资产</span><strong>${fmtMoney(best.final_equity)}</strong></div>
    <div class="metric"><span>缓存日期</span><strong style="font-size:16px;">${best.cache_created_at || "--"}</strong></div>
  `;

  $("overview-body").innerHTML = ranking.map((item, index) => `
    <tr>
      <td>${index + 1}</td>
      <td><span class="strategy-link" onclick="pickStrategy('${item.strategy_id}')">${item.strategy_name}</span></td>
      <td class="${pctClass(item.return_pct)}">${item.return_pct}%</td>
      <td class="green">${item.drawdown_pct}%</td>
      <td>${item.win_rate_pct}%</td>
      <td>${item.trade_count}</td>
      <td>${fmtMoney(item.final_equity)}</td>
      <td>${item.score}</td>
    </tr>
  `).join("");
  renderOverviewChart(ranking);
}

function renderOverviewChart(ranking) {
  if (overviewChart) overviewChart.dispose();
  overviewChart = echarts.init($("overview-chart"));
  overviewChart.setOption({
    backgroundColor: "transparent",
    tooltip: { trigger: "axis" },
    grid: { left: 56, right: 24, top: 26, bottom: 88 },
    xAxis: {
      type: "category",
      data: ranking.map(x => x.strategy_name),
      axisLabel: { color: "#9ca3af", rotate: 28 },
      axisLine: { lineStyle: { color: "#374151" } },
    },
    yAxis: {
      type: "value",
      axisLabel: { color: "#9ca3af", formatter: "{value}%" },
      splitLine: { lineStyle: { color: "#27313f" } },
    },
    series: [{
      name: "账户收益",
      type: "bar",
      data: ranking.map(x => ({
        value: x.return_pct,
        itemStyle: { color: x.return_pct >= 0 ? "#ef4444" : "#22c55e" },
      })),
      label: { show: true, position: "top", color: "#cbd5e1", formatter: "{c}%" },
      barMaxWidth: 34,
    }]
  });
}

function pickStrategy(strategyId) {
  $("strategy").value = strategyId;
  loadSelectedStrategy();
}

async function loadSelectedStrategy() {
  const strategyId = $("strategy").value;
  const strategy = strategies.find(item => item.id === strategyId);
  if (!strategyId || !strategy) {
    showDetailEmpty("点击上方策略名，查看该策略的收益曲线和交易详情");
    return;
  }

  const btn = $("refresh-btn");
  btn.disabled = true;
  btn.textContent = "读取中...";
  try {
    const res = await fetch(`/api/backtest/market/${strategyId}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "回测结果读取失败");
    renderDetail(strategy, data);
  } catch (err) {
    showDetailEmpty(err.message);
    toast(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "读取详情";
  }
}

function showDetailEmpty(msg) {
  $("detail-empty").style.display = "flex";
  $("equity-chart").style.display = "none";
  $("open-positions").style.display = "none";
  $("open-positions-body").innerHTML = '<tr><td colspan="8" class="muted">--</td></tr>';
  $("curve-hint").textContent = "暂无详情";
  $("stock-body").innerHTML = '<tr><td colspan="6" class="muted">请选择策略后查看</td></tr>';
  $("trade-body").innerHTML = '<tr><td colspan="12" class="muted">请选择策略后查看</td></tr>';
  $("trade-hint").textContent = msg;
}

function renderDetail(strategy, data) {
  currentDetailData = data;
  const s = data.summary;
  $("detail-empty").style.display = "none";
  $("equity-chart").style.display = "block";
  $("curve-hint").textContent = `${data.strategy.name}，${data.selection.days} 天，最多持有 ${data.selection.max_positions} 只`;
  $("note").textContent = `${strategy.description} 最新交易日 ${data.selection.latest_trade_date}，缓存时间 ${data.cache?.created_at || "--"}`;
  const initCash = Number(data.selection.initial_cash || 0);
  const posMap = buildPositionMap(data.trades || []);
  renderOpenPositions(data.trades || [], data.equity_curve || [], posMap, initCash);
  renderEquity(data.equity_curve || [], posMap, initCash);
  renderStocks(data.stock_summaries || []);
  renderTrades(data);
  // 加载数据后自动展开所有面板
  expandAllPanels();
  const row = overviewRanking.find(item => item.strategy_id === strategy.id);
  if (row) {
    $("summary").innerHTML = `
      <div class="metric"><span>当前策略</span><strong>${data.strategy.name}</strong></div>
      <div class="metric"><span>账户收益</span><strong class="${pctClass(s.total_return_pct)}">${s.total_return_pct}%</strong></div>
      <div class="metric"><span>最大回撤</span><strong class="green">${s.max_drawdown_pct}%</strong></div>
      <div class="metric"><span>交易胜率</span><strong>${s.win_rate_pct}%</strong></div>
      <div class="metric"><span>综合评分</span><strong>${row.score}</strong></div>
    `;
  }
}

function buildPositionMap(trades) {
  // 构建事件日 → 持仓快照，含最终盈亏
  const snapshots = {};
  const holdings = {};

  // 先建卖出索引：code+buy_date → profit_pct（仅已平仓的，期末持仓不算）
  const sellOutcome = {};
  for (const t of trades) {
    if (!t.sell_date || t.sell_reason === "期末持仓") continue;
    const key = `${t.code}_${t.buy_date}`;
    sellOutcome[key] = { profit_pct: t.profit_pct, sell_date: t.sell_date, sell_reason: t.sell_reason || "" };
  }

  const events = [];
  for (const t of trades) {
    // 期末持仓不是真正的卖出，不生成卖出事件
    if (t.sell_date && t.sell_reason !== "期末持仓") {
      events.push({ date: t.sell_date, action: "sell", code: t.code, name: t.name, shares: t.shares, buy_price: t.buy_price, buy_date: t.buy_date, reason: t.sell_reason || "" });
    }
    events.push({ date: t.buy_date, action: "buy", code: t.code, name: t.name, shares: t.shares, price: t.buy_price, reason: t.buy_reason || "" });
  }
  events.sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    return a.action === "sell" ? -1 : 1;
  });

  for (const ev of events) {
    if (ev.action === "sell") {
      // 卖出前记录快照（含盈亏）
      const outKey = `${ev.code}_${ev.buy_date}`;
      const outcome = sellOutcome[outKey];
      snapshots[ev.date] = Object.values(holdings).map(p => ({
        ...p,
        profit_pct: p.code === ev.code && outcome ? outcome.profit_pct : p.profit_pct
      }));
      delete holdings[ev.code];
      snapshots[ev.date] = Object.values(holdings).map(p => ({...p}));
    } else {
      // 从 sellOutcome 查找该笔买入的最终盈亏
      const outKey = `${ev.code}_${ev.date}`;
      const outcome = sellOutcome[outKey];
      holdings[ev.code] = {
        code: ev.code, name: ev.name, buy_date: ev.date,
        buy_price: ev.price, shares: ev.shares,
        profit_pct: outcome ? outcome.profit_pct : null
      };
      snapshots[ev.date] = Object.values(holdings).map(p => ({...p}));
    }
  }

  const sortedDates = Object.keys(snapshots).sort();
  const result = {};
  let lastPositions = [];
  for (const d of sortedDates) {
    lastPositions = snapshots[d];
    result[d] = lastPositions;
  }
  result._sortedDates = sortedDates;
  result._find = function(targetDate) {
    let best = null;
    for (const d of this._sortedDates) {
      if (d <= targetDate) best = d;
      else break;
    }
    return best ? this[best] : [];
  };
  return result;
}

// ======== 持仓快照（按日期查看） ========
let currentPosTrades = [];
let currentPosEquityCurve = [];
let currentPosInitCash = 0;
let currentPosMap = null;

function getPositionsOnDate(date, trades) {
  // 筛选在指定日期持有的仓位：已买入且未卖出（或期末持仓）
  // 注意：sell_date 可能为 null（当日买入无期末记录），要一并纳入
  const seen = new Set();
  const result = [];
  for (const t of trades) {
    if (!(t.buy_date <= date)) continue;
    if (!(!t.sell_date || t.sell_date > date || t.sell_reason === "期末持仓")) continue;
    // 去重：同一只股票同一天买入只保留一条（优先期末持仓记录，有 profit_pct）
    const key = `${t.code}_${t.buy_date}`;
    if (seen.has(key)) {
      // 如果已有的是普通买入、新来的是期末持仓，替换
      const existing = result.find(r => r._key === key);
      if (existing && existing._source !== "open" && t.sell_reason === "期末持仓") {
        Object.assign(existing, buildPosEntry(t, date, "open"));
      }
      continue;
    }
    seen.add(key);
    result.push(buildPosEntry(t, date, t.sell_reason === "期末持仓" ? "open" : "buy"));
  }
  return result;
}

function buildPosEntry(t, date, source) {
  const holdDays = Math.max(0, Math.floor((new Date(date) - new Date(t.buy_date)) / 86400000));
  // 浮盈统一由 refreshPositionTable 通过 API 获取当日收盘价实时计算
  // 只有当日买入的直接给 0%（买入价≈当日收盘价）
  let profitPct = null;
  if (t.buy_date === date) {
    profitPct = 0;
  }
  return {
    _key: `${t.code}_${t.buy_date}`,
    _source: source,
    code: t.code, name: t.name, buy_date: t.buy_date,
    buy_price: t.buy_price, shares: t.shares,
    profit_pct: profitPct,
    hold_days: holdDays,
  };
}

function renderOpenPositions(trades, equityCurve, posMap, initialCash) {
  currentPosTrades = trades || [];
  currentPosEquityCurve = equityCurve || [];
  currentPosInitCash = initialCash;
  currentPosMap = posMap;

  const lastDate = equityCurve.length ? equityCurve[equityCurve.length - 1].date : '';
  const firstDate = equityCurve.length ? equityCurve[0].date : '';

  // 设置日期选择器范围
  const dateInput = $("position-date");
  if (firstDate) dateInput.min = firstDate;
  if (lastDate) dateInput.max = lastDate;

  // 默认最新交易日（面板空仓也会显示，用户可自行切换）
  dateInput.value = lastDate;

  // 默认渲染最新日期
  refreshPositionTable(lastDate);
}

function onPositionDateChange() {
  const date = $("position-date").value;
  if (!date) return;
  refreshPositionTable(date);
}

async function refreshPositionTable(date) {
  const el = $("open-positions");
  const body = $("open-positions-body");
  const hint = $("position-date-hint");

  const positions = getPositionsOnDate(date, currentPosTrades);

  // 该日期的账户权益
  let equityOnDate = currentPosInitCash;
  for (const p of currentPosEquityCurve) {
    if (p.date <= date) equityOnDate = p.equity;
  }

  // 始终显示面板，没有持仓时给提示
  el.style.display = "block";

  if (!positions.length) {
    hint.textContent = `${date}，权益 ${fmtMoney(equityOnDate)}，暂无持仓`;
    body.innerHTML = '<tr><td colspan="8" class="muted">该日期无持仓，请选择其他日期查看</td></tr>';
    return;
  }

  // 对没有 profit_pct 的持仓，批量获取当日收盘价来计算浮盈
  const needPrice = positions.filter(p => p.profit_pct == null);
  if (needPrice.length) {
    const codes = needPrice.map(p => p.code).join(",");
    try {
      const priceRes = await fetch(`/api/stocks/prices?codes=${encodeURIComponent(codes)}&date=${date}`);
      const priceMap = await priceRes.json();
      for (const p of needPrice) {
        const close = priceMap[p.code];
        if (close != null && p.buy_price > 0) {
          p.profit_pct = Number(((close / p.buy_price - 1) * 100).toFixed(2));
        }
      }
    } catch (e) {
      // 获取价格失败则保持 --
    }
  }

  hint.textContent = `${date}，权益 ${fmtMoney(equityOnDate)}，持仓 ${positions.length} 只`;

  body.innerHTML = positions.map(p => {
    const cost = (p.shares || 0) * (p.buy_price || 0);
    const weightPct = equityOnDate > 0 ? (cost / equityOnDate * 100) : 0;
    let profitHtml = '<span class="muted">--</span>';
    if (p.profit_pct != null) {
      const cls = p.profit_pct >= 0 ? "red" : "green";
      const sign = p.profit_pct >= 0 ? "+" : "";
      profitHtml = `<span class="${cls}">${sign}${p.profit_pct}%</span>`;
    }
    return `<tr>
      <td>${stockLabel(p.code, p.name)}</td>
      <td>${p.buy_date || "-"}</td>
      <td>${(p.buy_price || 0).toFixed(2)}</td>
      <td>${p.shares || 0}</td>
      <td>${fmtMoney(cost)}</td>
      <td>${weightPct.toFixed(1)}%</td>
      <td>${p.hold_days}天</td>
      <td>${profitHtml}</td>
    </tr>`;
  }).join("");
}

function renderEquity(curve, posMap, initCash) {
  if (equityChart) equityChart.dispose();
  equityChart = echarts.init($("equity-chart"));
  const dates = curve.map(x => x.date);

  equityChart.setOption({
    backgroundColor: "transparent",
    tooltip: {
      trigger: "axis",
      formatter: function(params) {
        const p = params[0];
        const date = p.axisValue;
        const equity = p.value;
        const idx = dates.indexOf(date);
        const posCount = idx >= 0 && curve[idx] ? (curve[idx].position_count || 0) : 0;
        const cash = idx >= 0 && curve[idx] ? (curve[idx].cash || 0) : 0;
        const positions = posMap && posMap._find ? posMap._find(date) : [];
        const portReturn = initCash > 0 ? ((equity - initCash) / initCash * 100) : 0;
        const retColor = portReturn >= 0 ? '#3fb950' : '#f85149';
        let html = `<div style="font-weight:600;margin-bottom:6px;">${date}</div>`;
        html += `<div style="margin-bottom:2px;">权益: <b style="color:#38bdf8;">${Number(equity).toLocaleString()}</b>`;
        html += ` | 收益: <b style="color:${retColor};">${portReturn>=0?'+':''}${portReturn.toFixed(1)}%</b></div>`;
        html += `<div style="margin-bottom:4px;color:#9ca3af;font-size:11px;">现金 ${Number(cash).toLocaleString()} | 持仓 ${posCount}/5 只</div>`;
        if (positions.length) {
          html += `<div style="border-top:1px solid #374151;margin-top:4px;padding-top:4px;font-size:11px;">`;
          for (const pos of positions) {
            const holdDays = Math.floor((new Date(date) - new Date(pos.buy_date)) / 86400000);
            const holdStr = holdDays === 0 ? '今日买入' : `持${holdDays}天`;
            const profitStr = pos.profit_pct != null
              ? `<span style="color:${pos.profit_pct>=0?'#3fb950':'#f85149'};font-weight:500;">${pos.profit_pct>=0?'+':''}${pos.profit_pct}%</span>`
              : '';
            html += `<div style="margin:1px 0;display:flex;gap:8px;">`;
            html += `<span style="font-family:monospace;">${pos.code}</span> <span>${pos.name}</span>`;
            html += `<span style="color:#9ca3af;">${pos.shares}股 @${pos.buy_price.toFixed(2)}</span>`;
            html += `<span style="color:#8b92a0;">${holdStr}</span>`;
            if (profitStr) html += profitStr;
            html += `</div>`;
          }
          html += `</div>`;
        }
        return html;
      }
    },
    grid: { left: 60, right: 24, top: 28, bottom: 42 },
    xAxis: {
      type: "category",
      data: dates,
      axisLabel: { color: "#9ca3af" },
      axisLine: { lineStyle: { color: "#374151" } },
    },
    yAxis: {
      type: "value",
      scale: true,
      axisLabel: { color: "#9ca3af" },
      splitLine: { lineStyle: { color: "#27313f" } },
    },
    series: [{
      name: "账户权益",
      type: "line",
      smooth: true,
      showSymbol: false,
      data: curve.map(x => x.equity),
      areaStyle: { color: "rgba(14, 165, 233, .14)" },
      lineStyle: { color: "#38bdf8", width: 2 },
    }]
  });
}

function renderStocks(stocks) {
  const shown = stocks.slice(0, 120);
  if (!shown.length) {
    $("stock-body").innerHTML = '<tr><td colspan="6" class="muted">暂无贡献股票</td></tr>';
    return;
  }
  $("stock-body").innerHTML = shown.map((x, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${stockLabel(x.code, x.name)}</td>
      <td class="${pctClass(x.profit)}">${fmtMoney(x.profit)}</td>
      <td>${x.trade_count}</td>
      <td>${x.win_rate_pct}%</td>
      <td>${x.avg_hold_days || 0}天</td>
    </tr>
  `).join("");
}

let tradeEvents = [];
let currentDetailData = null; // 当前策略回测数据

function renderTrades(data) {
  tradeEvents = buildTradeEvents(data);
  $("trade-hint").textContent = `${tradeEvents.length} 条买卖事件`;
  applyTradeFilter();
}

function applyTradeFilter() {
  const dateQ = ($("trade-filter-date")?.value || "").trim().toLowerCase();
  const stockQ = ($("trade-filter-stock")?.value || "").trim().toLowerCase();

  let events = tradeEvents.filter(e => {
    if (dateQ && !e.date.includes(dateQ)) return false;
    if (stockQ && !e.code.toLowerCase().includes(stockQ) && !e.name.toLowerCase().includes(stockQ)) return false;
    return true;
  });

  const countEl = $("trade-filter-count");
  if (countEl) countEl.textContent = dateQ || stockQ ? `筛选 ${events.length}/${tradeEvents.length}` : "";

  if (!events.length) {
    $("trade-body").innerHTML = '<tr><td colspan="12" class="muted">无匹配交易</td></tr>';
    return;
  }
  $("trade-body").innerHTML = events.map((e) => {
    const actionText = e.action === "buy" ? "买入" : "卖出";
    const actionClass = e.action === "buy" ? "action-buy" : "action-sell";
    const pctStr = e.position_pct != null ? `${e.position_pct}%` : "-";
    const holdStr = e.hold_days != null ? `${e.hold_days}天` : "-";
    return `
      <tr class="stock-mark" style="--stock-color:${stockColor(e.code)}">
        <td>${e.step}</td>
        <td>${e.date}</td>
        <td><span class="action-badge ${actionClass}">${actionText}</span></td>
        <td>${stockLabel(e.code, e.name)}</td>
        <td>${e.price}</td>
        <td>${e.shares}</td>
        <td>${fmtMoney(e.amount)}</td>
        <td>${pctStr}</td>
        <td>${holdStr}</td>
        <td class="${e.action === "sell" ? pctClass(e.profit_pct) : "muted"}">${e.action === "sell" ? (e.profit_pct>=0?'+':'')+e.profit_pct+'%' : "--"}</td>
        <td class="${pctClass(e.account_return_pct)}">${e.account_return_pct}%</td>
        <td>${e.reason}</td>
      </tr>
    `;
  }).join("");
}

function clearTradeFilter() {
  if ($("trade-filter-date")) $("trade-filter-date").value = "";
  if ($("trade-filter-stock")) $("trade-filter-stock").value = "";
  applyTradeFilter();
}

function buildTradeEvents(data) {
  const initialCash = Number(data.selection.initial_cash || 0);
  const equityByDate = {};
  for (const point of data.equity_curve || []) equityByDate[point.date] = point.equity;

  // 先建买入索引，供卖出计算持仓天数
  const buyMap = {}; // code → [{date, price, shares}]
  for (const t of data.trades || []) {
    if (!buyMap[t.code]) buyMap[t.code] = [];
    buyMap[t.code].push({ date: t.buy_date, price: t.buy_price, shares: t.shares });
  }

  const events = [];
  for (const t of data.trades || []) {
    // 买
    const eqBuy = equityByDate[t.buy_date] || initialCash;
    const pctBuy = eqBuy > 0 ? (t.buy_amount / eqBuy * 100) : 0;
    events.push({
      action: "buy", date: t.buy_date, code: t.code, name: t.name,
      price: t.buy_price, shares: t.shares, amount: t.buy_amount,
      reason: t.buy_reason, sort: 1,
      position_pct: Number(pctBuy.toFixed(1)),
      hold_days: null,
      open: !t.sell_date,
    });
    // 卖（已平仓才添加卖出事件，期末持仓不算卖出）
    if (t.sell_date && t.sell_reason !== "期末持仓") {
      const eqSell = equityByDate[t.sell_date] || initialCash;
      const pctSell = eqSell > 0 ? (t.sell_amount / eqSell * 100) : 0;
      const buys = buyMap[t.code] || [];
      let holdDays = null;
      for (let i = buys.length - 1; i >= 0; i--) {
        if (buys[i].date <= t.sell_date) {
          holdDays = Math.floor((new Date(t.sell_date) - new Date(buys[i].date)) / 86400000);
          break;
        }
      }
      events.push({
        action: "sell", date: t.sell_date, code: t.code, name: t.name,
        price: t.sell_price, shares: t.shares, amount: t.sell_amount,
        profit: t.profit, profit_pct: t.profit_pct, reason: t.sell_reason, sort: 0,
        position_pct: Number(pctSell.toFixed(1)),
        hold_days: holdDays,
      });
    }
  }

  // 倒序排列（最新在前）
  events.sort((a, b) => {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    if (a.sort !== b.sort) return a.sort - b.sort;
    return a.code.localeCompare(b.code);
  });

  // 重新编号步骤
  let step = 0;
  for (let i = events.length - 1; i >= 0; i--) {
    step++;
    events[i].step = step;
  }

  let lastReturn = 0;
  for (const event of events) {
    if (equityByDate[event.date] !== undefined && initialCash) {
      lastReturn = (equityByDate[event.date] - initialCash) / initialCash * 100;
    }
    event.account_return_pct = Number(lastReturn.toFixed(2));
  }
  return events;
}

window.addEventListener("resize", () => {
  if (overviewChart) overviewChart.resize();
  if (equityChart) equityChart.resize();
});

init();
